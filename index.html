<!DOCTYPE html>
<html lang="pl" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="theme-color" content="#2c2c2e"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="Trening"/>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icon-192.png"/>
<title>Trening</title>
<style>

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#1a1a2e;--sf:rgba(255,255,255,.07);--sf2:rgba(255,255,255,.12);
  --bd:rgba(255,255,255,.12);
  --tx:#f5f5f7;--mt:#aeaeb2;--dm:#8e8e93;--sh:rgba(18,18,30,.85);--dp:rgba(0,0,0,.35);
  --gr:#30d158;--rd:#ff453a;--ac:#4F7BF7;
  --glass-bg:rgba(255,255,255,.08);
  --glass-border:rgba(255,255,255,.18);
  --glass-shine:rgba(255,255,255,.22);
  --glass-shadow:rgba(0,0,0,.35);
}
[data-theme=light]{
  --bg:#e8eaf0;--sf:rgba(255,255,255,.7);--sf2:rgba(255,255,255,.85);
  --bd:rgba(0,0,0,.09);
  --tx:#1c1c1e;--mt:#6c6c70;--dm:#8e8e93;--sh:rgba(255,255,255,.75);--dp:rgba(230,232,240,.9);
  --glass-bg:rgba(255,255,255,.55);
  --glass-border:rgba(255,255,255,.8);
  --glass-shine:rgba(255,255,255,.9);
  --glass-shadow:rgba(0,0,0,.12);
}

@keyframes gradientFlow{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

html,body{
  background:var(--bg);color:var(--tx);
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',sans-serif;
  min-height:100vh;-webkit-font-smoothing:antialiased;overscroll-behavior:none;
  transition:background .4s ease, color .3s ease;
}
/* Smooth theme transitions on key elements */
*{transition:background-color .3s ease, border-color .3s ease, box-shadow .3s ease}
.day-cell,.tab-bar,.hdr,.chart-w,.week-w,.stats,.sheet,.dblock-sum{
  transition:background .3s ease, border-color .3s ease, box-shadow .3s ease, backdrop-filter .3s ease, color .3s ease;
}
/* Override for interactive elements - keep snappy */
.tab-btn,.day-cell:active,.ob-btn,.btn-save,.type-btn{transition:opacity .1s,transform .1s!important}


/* ANIMATED GRADIENT MESH — shows through glass */
body::before{
  content:'';position:fixed;inset:0;z-index:-1;
  background:
    radial-gradient(ellipse 80% 60% at 20% 10%, rgba(79,123,247,.35) 0%, transparent 60%),
    radial-gradient(ellipse 60% 80% at 80% 90%, rgba(155,123,240,.3) 0%, transparent 60%),
    radial-gradient(ellipse 70% 50% at 60% 40%, rgba(48,209,88,.15) 0%, transparent 55%),
    radial-gradient(ellipse 50% 70% at 10% 80%, rgba(232,146,60,.18) 0%, transparent 55%);
  background-size:200% 200%;
  animation:gradientFlow 18s ease infinite;
}
[data-theme=light] .dblock-body{background:rgba(255,255,255,.25)}
[data-theme=light] body::before{
  background:
    radial-gradient(ellipse 80% 60% at 20% 10%, rgba(79,123,247,.22) 0%, transparent 60%),
    radial-gradient(ellipse 60% 80% at 80% 90%, rgba(155,123,240,.2) 0%, transparent 60%),
    radial-gradient(ellipse 70% 50% at 60% 40%, rgba(48,209,88,.12) 0%, transparent 55%),
    radial-gradient(ellipse 50% 70% at 10% 80%, rgba(232,146,60,.15) 0%, transparent 55%);
  background-size:200% 200%;
  animation:gradientFlow 18s ease infinite;
}

@keyframes cellIn{from{opacity:0;transform:scale(.8)}to{opacity:1;transform:scale(1)}}
@keyframes slideL{from{opacity:0;transform:translateX(18px)}to{opacity:1;transform:none}}
@keyframes slideR{from{opacity:0;transform:translateX(-18px)}to{opacity:1;transform:none}}
@keyframes fadeUp{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
@keyframes exDrop{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:none}}
.calendar.anim-l{animation:slideL .2s ease}
.calendar.anim-r{animation:slideR .2s ease}
.day-cell{animation:cellIn .16s ease backwards}

#app{max-width:420px;margin:0 auto;
  padding:max(env(safe-area-inset-top),28px) 20px max(env(safe-area-inset-bottom),48px);
  min-height:100vh}

/* HEADER */
.hdr{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:16px;
  padding:10px 14px;
  background:var(--glass-bg);
  backdrop-filter:blur(20px) saturate(160%);
  -webkit-backdrop-filter:blur(20px) saturate(160%);
  border:1px solid var(--glass-border);
  border-radius:18px;
  box-shadow:
    0 1.5px 0 var(--glass-shine) inset,
    0 4px 16px var(--glass-shadow);
}
.hdr-l{display:flex;align-items:center;gap:8px}
.logo{font-size:13px;font-weight:700;color:var(--tx)}
.hdr-r{display:flex;align-items:center;gap:6px}
.icon-btn{width:30px;height:30px;border-radius:10px;
  background:var(--glass-bg);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  border:1px solid var(--glass-border);
  color:var(--mt);cursor:pointer;display:flex;align-items:center;justify-content:center;
  -webkit-tap-highlight-color:transparent;flex-shrink:0;
  box-shadow:0 1px 0 var(--glass-shine) inset;}
.icon-btn:active{opacity:.6}
.lang-sw{display:flex;background:var(--glass-bg);border:1px solid var(--glass-border);
  border-radius:10px;padding:2px;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);}
.lang-btn{padding:4px 10px;border-radius:8px;border:none;background:transparent;
  font-family:inherit;font-size:11px;font-weight:500;color:var(--mt);
  cursor:pointer;-webkit-tap-highlight-color:transparent;transition:all .18s}
.lang-btn.on{background:rgba(255,255,255,.18);color:var(--tx);font-weight:600;
  box-shadow:0 1px 0 var(--glass-shine) inset;}

/* CHART */
.chart-w{
  background:var(--glass-bg);
  backdrop-filter:blur(20px) saturate(150%);
  -webkit-backdrop-filter:blur(20px) saturate(150%);
  border:1px solid var(--glass-border);
  border-radius:16px;padding:14px 14px 8px;margin-bottom:12px;
  box-shadow:0 1.5px 0 var(--glass-shine) inset,0 4px 20px var(--glass-shadow);}
.chart-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.chart-ttl{font-size:11px;font-weight:600;color:var(--mt)}
.ranges{display:flex;gap:1px}
.rbtn{padding:4px 7px;border-radius:5px;border:none;background:transparent;
  font-family:inherit;font-size:10px;font-weight:500;color:var(--dm);
  cursor:pointer;-webkit-tap-highlight-color:transparent;transition:all .15s}
.rbtn.on{background:var(--bg);color:var(--tx);font-weight:600}
#chartBars{display:block;width:100%;height:80px}

/* WEEK */
.week-w{
  background:var(--glass-bg);
  backdrop-filter:blur(20px) saturate(150%);
  -webkit-backdrop-filter:blur(20px) saturate(150%);
  border:1px solid var(--glass-border);
  border-radius:16px;padding:12px 14px 10px;margin-bottom:12px;
  box-shadow:0 1.5px 0 var(--glass-shine) inset,0 4px 16px var(--glass-shadow);}
.week-hdr{font-size:10px;font-weight:600;color:var(--mt);margin-bottom:9px}
.week-days{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.wday{display:flex;flex-direction:column;align-items:center;gap:4px}
.wday-n{font-size:9px;color:var(--dm)}
.wday-dot{width:20px;height:20px;border-radius:50%;background:var(--bd);flex-shrink:0}
.wday-dot.today-dot{outline:2px solid var(--tx);outline-offset:2px}
.wday-dot.fut{opacity:.3}
.wday-bar{width:16px;height:2px;border-radius:1px;background:var(--bd);overflow:hidden}
.wday-fill{height:100%;border-radius:1px;transition:width .3s ease}

/* NAV */
.nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.nav-btn{background:none;border:none;color:var(--mt);font-size:20px;cursor:pointer;
  padding:6px 10px;font-family:inherit;-webkit-tap-highlight-color:transparent}
.nav-btn:active{color:var(--tx)}
.nav-btn.dis{opacity:.2;pointer-events:none}
.mo-lbl{font-size:18px;font-weight:600;color:var(--tx)}

/* STATS */
.stats{display:flex;justify-content:space-between;align-items:center;
  background:var(--glass-bg);
  backdrop-filter:blur(20px) saturate(150%);
  -webkit-backdrop-filter:blur(20px) saturate(150%);
  border:1px solid var(--glass-border);
  border-radius:16px;padding:13px 0;margin-bottom:13px;
  box-shadow:0 1.5px 0 var(--glass-shine) inset,0 4px 16px var(--glass-shadow);}
.stat-blk{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.stat-n{font-size:20px;font-weight:600;color:var(--tx)}
.stat-l{font-size:9px;color:var(--mt)}
.stat-div{width:1px;height:26px;background:var(--bd)}

/* LEGEND */
.legend{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:13px}
.leg-it{display:flex;align-items:center;gap:5px;font-size:9px;color:var(--mt)}
.leg-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}

/* CALENDAR */
.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-bottom:14px}
.day-nm{text-align:center;font-size:10px;color:var(--dm);padding-bottom:4px}
.day-cell{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:1px;border-radius:8px;cursor:pointer;
  background:var(--glass-bg);border:1px solid var(--glass-border);
  -webkit-tap-highlight-color:transparent;
  user-select:none;outline:none;position:relative;overflow:hidden;
  font-family:inherit;transition:opacity .1s}
.int-strip{position:absolute;bottom:0;left:0;height:3px;background:rgba(255,255,255,.3)}
.day-n{font-size:12px;font-weight:400;color:var(--mt);line-height:1;position:relative;z-index:1}
.day-tag{font-size:7px;font-weight:600;line-height:1;opacity:0;position:relative;z-index:1}
.day-cell.trained .day-n{color:#fff;font-weight:600}
.day-cell.trained .day-tag{opacity:1;color:rgba(255,255,255,.8)}
.day-cell.today:not(.trained){
  background:rgba(79,123,247,.15);
  border-color:rgba(79,123,247,.5)!important;
  box-shadow:0 0 0 1px rgba(79,123,247,.3),0 2px 12px rgba(79,123,247,.25)!important;
}
.day-cell.today .day-n{
  width:22px;height:22px;border-radius:50%;background:var(--ac);
  color:#fff!important;font-weight:800!important;font-size:12px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 1px 6px rgba(79,123,247,.6);}
.day-cell.today.trained .day-n{background:rgba(255,255,255,.3);box-shadow:none}
.day-cell.fut{opacity:.25;pointer-events:none}
.day-cell:active:not(.fut){opacity:.6}

/* PROGRESS */
.bar-w{margin-top:2px}
.bar-track{height:3px;background:var(--sf);border-radius:2px;overflow:hidden;margin-bottom:7px}
.bar-fill{height:100%;border-radius:2px;transition:width .5s ease;background:var(--ac)}
.goal-row{display:flex;justify-content:space-between;align-items:center}
.bar-lbl{font-size:10px;color:var(--mt)}
.goal-ctrl{display:flex;align-items:center;gap:5px}
.goal-step{width:20px;height:20px;border-radius:5px;background:var(--sf);border:none;
  color:var(--mt);font-size:14px;cursor:pointer;display:flex;align-items:center;
  justify-content:center;-webkit-tap-highlight-color:transparent;line-height:1;font-family:inherit}
.goal-step:active{opacity:.5}
.goal-val{font-size:10px;color:var(--dm);white-space:nowrap;min-width:38px;text-align:center}

/* COMPARE */
.sec-tog{display:flex;justify-content:center;margin-top:16px;margin-bottom:4px}
.sec-tog-btn{background:none;border:1px solid var(--bd);color:var(--mt);
  font-family:inherit;font-size:11px;padding:6px 16px;border-radius:4px;
  cursor:pointer;-webkit-tap-highlight-color:transparent}
.cmp-panel{margin-top:12px;display:none;animation:fadeUp .2s ease}
.cmp-pick{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:12px}
.cmp-pick button{background:var(--sf);border:none;color:var(--mt);font-family:inherit;
  font-size:14px;padding:5px 12px;border-radius:6px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.cmp-pick span{font-size:13px;font-weight:600;color:var(--tx);min-width:110px;text-align:center}
.cmp-cols{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.cmp-col{background:var(--sf);border-radius:10px;padding:12px}
.cmp-col-ttl{font-size:10px;font-weight:600;color:var(--mt);text-align:center;margin-bottom:10px}
.cmp-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px}
.cmp-lbl{font-size:9px;color:var(--dm)}
.cmp-val{font-size:14px;font-weight:700;color:var(--tx)}
.cmp-bar{height:4px;border-radius:2px;margin-top:8px;opacity:.5}

/* YEAR */
.yr-tog{display:flex;justify-content:center;margin-top:20px;margin-bottom:4px}
.yr-tog-btn{background:none;border:1px solid var(--bd);color:var(--mt);
  font-family:inherit;font-size:11px;padding:6px 16px;border-radius:4px;
  cursor:pointer;-webkit-tap-highlight-color:transparent}
.yr-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:8px}
@keyframes yrFadeIn{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:scale(1)}}
.mini-mo{background:var(--glass-bg);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  border:1px solid var(--glass-border);border-radius:10px;padding:10px 8px;cursor:pointer;
  transition:transform .15s,box-shadow .15s;animation:yrFadeIn .3s ease backwards;}
.mini-mo:active{transform:scale(.95)}
.mini-mo:hover{box-shadow:0 0 0 1px var(--ac),0 4px 12px rgba(79,123,247,.2)}
.mini-mo-nm{font-size:9px;color:var(--mt);text-align:center;margin-bottom:6px}
.mini-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.mini-dot{aspect-ratio:1;border-radius:1px;background:var(--bd)}
.mini-dot.empty{background:transparent}
.mini-stat{text-align:center;font-size:9px;color:var(--mt);margin-top:5px}
.mini-stat b{color:var(--tx)}

/* OVERLAY */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;
  opacity:0;transition:opacity .22s;pointer-events:none}
.ov.on{opacity:1;pointer-events:all}

/* BOTTOM SHEET */
.sheet{position:fixed;bottom:0;left:50%;transform:translateX(-50%) translateY(100%);
  width:100%;max-width:420px;
  background:var(--glass-bg);
  backdrop-filter:blur(40px) saturate(200%);
  -webkit-backdrop-filter:blur(40px) saturate(200%);
  border:1px solid var(--glass-border);
  border-bottom:none;
  border-radius:24px 24px 0 0;
  box-shadow:0 2px 0 var(--glass-shine) inset,0 -8px 40px var(--glass-shadow);
  z-index:201;transition:transform .3s cubic-bezier(.32,.72,0,1);
  max-height:92vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
.sheet.on{transform:translateX(-50%) translateY(0)}
.sh-handle{width:36px;height:4px;background:#48484a;border-radius:2px;margin:12px auto 0}
.sh-date{font-size:13px;font-weight:600;color:var(--tx);text-align:center;
  padding:12px 0 14px;border-bottom:1px solid var(--bd)}
.sh-inner{padding:0 16px max(env(safe-area-inset-bottom),24px)}
.sec-lbl{font-size:11px;font-weight:600;color:var(--dm);margin:15px 0 9px}

/* TYPE PICKER */
.type-picker{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.tp-arr{width:32px;height:52px;
  background:var(--glass-bg);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  border:1px solid var(--glass-border);border-radius:12px;
  color:var(--tx);font-size:20px;cursor:pointer;display:flex;align-items:center;
  justify-content:center;-webkit-tap-highlight-color:transparent;flex-shrink:0;line-height:1;
  transition:transform .12s,opacity .12s}
.tp-arr:active{transform:scale(.88);opacity:.6}
.tp-track-wrap{flex:1;overflow:hidden;border-radius:14px}
.tp-track{display:flex;transition:transform .3s cubic-bezier(.32,.72,0,1);will-change:transform}
.tp-card{
  flex:0 0 100%;padding:13px 0;border-radius:14px;text-align:center;
  font-size:15px;font-weight:700;color:#fff;letter-spacing:.02em;position:relative;
  transition:opacity .2s,filter .2s;
}
.tp-card::after{
  content:'';position:absolute;inset:0;border-radius:14px;
  background:linear-gradient(180deg,rgba(255,255,255,.18) 0%,transparent 60%);
  pointer-events:none;
}
.tp-card .tp-sub{font-size:10px;font-weight:500;opacity:.75;display:block;margin-top:3px;letter-spacing:.04em}

/* EXERCISE ADD AREA */
.ex-add{background:var(--dp);border-radius:8px;padding:10px 10px 8px;margin-bottom:6px}
.ex-name-inp{width:100%;background:transparent;border:none;border-bottom:1px solid var(--bd);
  color:var(--tx);font-family:inherit;font-size:13px;padding:2px 0 6px;outline:none;
  margin-bottom:8px;display:block}
.ex-name-inp::placeholder{color:var(--dm)}
.ex-add-row{display:flex;align-items:flex-end;gap:6px}
.ex-grp{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1}
.ex-grp-l{font-size:9px;color:var(--dm)}
.ex-cfm{width:28px;height:28px;border-radius:8px;background:var(--ac);border:none;
  color:#fff;font-size:20px;font-weight:300;cursor:pointer;display:flex;align-items:center;
  justify-content:center;-webkit-tap-highlight-color:transparent;flex-shrink:0;line-height:1}
.ex-cfm:active{opacity:.7}
.ex-cfm.edit{background:#3DAF78;font-size:16px}
.ex-hist{margin-top:8px;min-height:10px;line-height:1.4}
.ex-hist-empty{font-size:9px;color:var(--dm)}
.ex-hist-card{
  display:flex;align-items:center;gap:8px;
  background:rgba(79,123,247,.12);
  border:1px solid rgba(79,123,247,.25);
  border-radius:8px;padding:7px 10px;
}
.ex-hist-weight{font-size:20px;font-weight:800;color:var(--ac);line-height:1}
.ex-hist-unit{font-size:10px;color:var(--ac);opacity:.8;margin-left:1px}
.ex-hist-detail{flex:1;min-width:0}
.ex-hist-sets{font-size:11px;color:var(--tx);font-weight:600}
.ex-hist-date{font-size:9px;color:var(--dm);margin-top:1px}
.ex-hist-trend{display:flex;align-items:center;gap:4px}

/* EXERCISE ROWS */
.ex-list{display:flex;flex-direction:column;gap:4px;margin-bottom:4px}
.ex-row{display:flex;align-items:center;background:var(--dp);border-radius:8px;
  padding:8px 10px;gap:8px;animation:exDrop .2s ease backwards}
.ex-row.editing{outline:1px solid var(--ac);outline-offset:-1px}
.ex-row-info{flex:1;min-width:0}
.ex-row-name{font-size:12px;font-weight:600;color:var(--tx);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ex-row-stats{font-size:10px;color:var(--mt);margin-top:1px}
.ex-row-btns{display:flex;gap:4px;flex-shrink:0}
.ex-row-btn{width:22px;height:22px;border-radius:5px;background:var(--sf);border:none;
  color:var(--mt);font-size:11px;cursor:pointer;display:flex;align-items:center;
  justify-content:center;-webkit-tap-highlight-color:transparent}
.ex-row-btn.eb{color:var(--ac)}
.ex-row-btn:active{opacity:.5}

/* TEMPLATE ROW */
.tpl-row{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:4px;scrollbar-width:none}
.tpl-row::-webkit-scrollbar{display:none}
.tpl-it{display:flex;align-items:center;flex-shrink:0}
.tpl-load{padding:5px 10px;background:var(--sf2);border:none;border-radius:20px 0 0 20px;
  font-family:inherit;font-size:11px;font-weight:500;color:var(--tx);
  cursor:pointer;-webkit-tap-highlight-color:transparent;white-space:nowrap}
.tpl-load:active{opacity:.6}
.tpl-del{padding:5px 8px;background:rgba(255,69,58,.15);border:none;border-radius:0 20px 20px 0;
  font-size:12px;color:var(--rd);cursor:pointer;-webkit-tap-highlight-color:transparent;font-family:inherit}
.tpl-del:active{opacity:.6}
.btn-sv-tpl{width:100%;padding:9px;background:transparent;border:1px dashed var(--bd);
  border-radius:8px;font-family:inherit;font-size:11px;color:var(--dm);
  cursor:pointer;-webkit-tap-highlight-color:transparent;margin-top:6px}
.btn-sv-tpl:active{opacity:.6}
.btn-last-workout{width:100%;padding:9px;background:var(--sf);border:none;
  border-radius:8px;font-family:inherit;font-size:11px;font-weight:500;color:var(--mt);
  cursor:pointer;-webkit-tap-highlight-color:transparent;margin-top:6px;
  display:flex;align-items:center;justify-content:center;gap:5px}
.btn-last-workout:active{opacity:.6}
.btn-last-workout .lw-name{color:var(--tx);font-weight:600;max-width:160px;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* STEPPER */
.stepper{display:flex;align-items:center}
.step-btn{width:22px;height:22px;border-radius:5px;background:var(--sf);border:none;
  color:var(--tx);font-size:14px;cursor:pointer;display:flex;align-items:center;
  justify-content:center;-webkit-tap-highlight-color:transparent;font-family:inherit;flex-shrink:0;line-height:1}
.step-btn:active{opacity:.5}
.step-val{min-width:28px;text-align:center;font-size:12px;font-weight:600;color:var(--tx)}

/* RUN */
.run-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.run-stat{display:flex;flex-direction:column;align-items:center;gap:6px}
.run-lbl{font-size:9px;color:var(--dm)}
.pace-box{background:var(--dp);border-radius:10px;padding:14px;text-align:center;margin-top:10px}
.pace-val{font-size:26px;font-weight:600;color:var(--tx)}
.pace-unit{font-size:11px;color:var(--mt);margin-left:3px}

/* INTENSITY */
.int-w{background:var(--dp);border-radius:10px;padding:14px 10px 10px}
.int-bars{display:flex;align-items:flex-end;gap:5px;height:58px;margin-bottom:10px}
.i-w{flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:flex-end;height:100%;cursor:pointer;-webkit-tap-highlight-color:transparent;
  transition:transform .15s cubic-bezier(.34,1.56,.64,1)}
.i-w:active{transform:scaleY(.88)}
.i-b{width:100%;border-radius:4px 4px 0 0;background:var(--bd);min-height:4px;
  transition:height .3s cubic-bezier(.34,1.56,.64,1), background .25s ease, box-shadow .25s ease}
.i-b.on{background:var(--ic,#3b9eff);box-shadow:0 -2px 10px var(--ic,#3b9eff)}
.i-b.selected{background:var(--ic,#3b9eff);box-shadow:0 -4px 18px var(--ic,#3b9eff),0 0 0 1.5px rgba(255,255,255,.25) inset;transform:scaleX(1.1)}
.i-l{font-size:9px;color:var(--dm);margin-top:5px;transition:color .2s,font-weight .2s,transform .2s}
.i-w.on .i-l{color:var(--tx);font-weight:800;transform:translateY(-1px)}
.i-val{text-align:center;font-size:11px;color:var(--mt);min-height:18px;transition:all .2s}
.i-val b{color:var(--tx);font-size:14px;font-weight:800}

/* ACTIONS */
.notes-ta::placeholder{color:var(--dm)}
.notes-ta:focus{border-color:var(--dm)}
.sh-actions{display:flex;gap:8px;margin-top:14px}
.btn-save{flex:1;padding:14px 0;background:var(--tx);border:none;border-radius:10px;
  font-family:inherit;font-size:13px;font-weight:700;color:var(--sh);
  cursor:pointer;-webkit-tap-highlight-color:transparent}
.btn-save:active{opacity:.7}
.btn-del{padding:14px 16px;background:transparent;border:1px solid var(--bd);
  border-radius:10px;font-family:inherit;font-size:11px;color:var(--mt);
  cursor:pointer;-webkit-tap-highlight-color:transparent}
.btn-del:active{opacity:.6}

/* AUTOCOMPLETE */
#acDrop{display:none;position:fixed;z-index:400;border-radius:10px;overflow:hidden;
  box-shadow:0 8px 28px rgba(0,0,0,.5);max-height:220px;overflow-y:auto}
.ac-it{padding:9px 14px;font-size:13px;cursor:pointer;color:var(--tx);
  border-bottom:1px solid var(--bd);background:var(--sh);-webkit-tap-highlight-color:transparent}
.ac-it:last-child{border-bottom:none}
.ac-it:active{background:var(--sf)}
.ac-hl{color:var(--ac);font-weight:600}

/* DRAWER */
.drw-ov{position:fixed;inset:0;background:rgba(0,0,0,0);z-index:300;
  transition:background .28s ease;pointer-events:none}
.drw-ov.on{background:rgba(0,0,0,.52);pointer-events:all}
.drw{position:fixed;top:0;left:0;width:min(300px,85vw);height:100dvh;
  background:var(--sh);z-index:301;
  transform:translateX(-100%);
  transition:transform .32s cubic-bezier(.4,0,.2,1);
  overflow-y:scroll;overscroll-behavior:contain}
.drw.on{transform:translateX(0)}
.drw-top{display:flex;align-items:center;justify-content:space-between;padding:max(env(safe-area-inset-top),22px) 18px 16px}
.drw-close{background:none;border:none;color:var(--mt);font-size:22px;cursor:pointer;
  padding:2px 6px;-webkit-tap-highlight-color:transparent;font-family:inherit;line-height:1}
.drw-logo{font-size:11px;font-weight:700;color:var(--dm);letter-spacing:.06em}

/* GREETING */
.drw-greet{padding:0 18px 16px;border-bottom:1px solid var(--bd)}
.greet-hi{font-size:20px;font-weight:700;color:var(--tx);margin-bottom:10px;line-height:1.2}
.greet-row{display:flex;align-items:center;gap:8px}
.greet-edit-link{font-size:11px;color:var(--ac);cursor:pointer;-webkit-tap-highlight-color:transparent;margin-top:4px;display:inline-block}
.name-inp{flex:1;background:var(--sf);border:none;border-radius:8px;
  color:var(--tx);font-family:inherit;font-size:13px;padding:8px 11px;outline:none}
.name-inp::placeholder{color:var(--dm)}
.name-sv{padding:8px 13px;background:var(--ac);border:none;border-radius:8px;
  color:#fff;font-family:inherit;font-size:11px;font-weight:600;cursor:pointer;
  -webkit-tap-highlight-color:transparent;white-space:nowrap}
.name-sv:active{opacity:.7}

/* DRAWER BLOCKS — grid accordion */
.dblock{border-bottom:1px solid var(--glass-border)}
.dblock:last-child{border-bottom:none}
.dblock-sum{
  display:flex;justify-content:space-between;align-items:center;
  width:100%;padding:14px 18px;
  font-size:12px;font-weight:700;color:var(--tx);letter-spacing:.03em;
  background:var(--glass-bg);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border:none;font-family:inherit;
  -webkit-tap-highlight-color:transparent;user-select:none;cursor:pointer;
  text-align:left}
.dblock-sum::after{content:'›';color:var(--dm);font-size:18px;
  transition:transform .28s ease;display:inline-block;flex-shrink:0}
.dblock.open .dblock-sum::after{transform:rotate(90deg)}
.dblock-wrap{
  display:grid;grid-template-rows:0fr;
  transition:grid-template-rows .3s cubic-bezier(.4,0,.2,1)}
.dblock.open .dblock-wrap{grid-template-rows:1fr}
.dblock-body{overflow:hidden;background:rgba(0,0,0,.12)}
.dblock.open .dblock-body{padding:12px 18px 16px}

/* WORKOUT STATS */
.ws-grid{display:flex;flex-direction:column;gap:8px}
.ws-card{border-radius:12px;padding:12px 14px;
  display:flex;align-items:center;gap:14px;position:relative;overflow:hidden}
.ws-card::before{content:'';position:absolute;inset:0;
  background:var(--glass-bg);backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);z-index:0;}
.ws-dot{width:36px;height:36px;border-radius:10px;flex-shrink:0;position:relative;z-index:1;
  display:flex;align-items:center;justify-content:center;}
.ws-info{min-width:0;position:relative;z-index:1;flex:1}
.ws-val{font-size:26px;font-weight:800;color:var(--tx);line-height:1}
.ws-lbl{font-size:11px;color:rgba(255,255,255,.6);margin-top:2px;font-weight:500}
.ws-card-bar{position:absolute;bottom:0;left:0;height:3px;opacity:.6;z-index:1}

/* ATLAS */
.atlas-grp{margin-bottom:1px}
.atlas-sum{display:flex;justify-content:space-between;align-items:center;
  width:100%;padding:9px 0;border:none;background:none;
  font-family:inherit;font-size:13px;font-weight:600;
  color:var(--tx);-webkit-tap-highlight-color:transparent;cursor:pointer;text-align:left}
.atlas-sum::after{content:'›';color:var(--dm);transition:transform .25s ease;
  font-size:14px;flex-shrink:0}
.atlas-grp.open .atlas-sum::after{transform:rotate(90deg)}
.atlas-items{display:none;flex-direction:column;gap:1px;padding-bottom:6px}
.atlas-grp.open .atlas-items{display:flex}
.atlas-it{font-size:12px;color:var(--mt);padding:5px 8px;border-radius:5px;
  cursor:pointer;-webkit-tap-highlight-color:transparent}
.atlas-it:active{background:var(--sf);color:var(--tx)}

/* RUN STATS */
.rs-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.rs-card{background:var(--sf);border-radius:8px;padding:10px 12px}
.rs-val{font-size:18px;font-weight:700;color:var(--tx)}
.rs-val.accent{color:#30d158;font-size:20px}
.rs-card.accent-card{box-shadow:0 0 0 1px rgba(48,209,88,.15),0 4px 16px rgba(48,209,88,.12)}
.rs-lbl{font-size:9px;color:var(--dm);margin-top:2px}
.rs-log-ttl{font-size:10px;font-weight:600;color:var(--dm);margin-bottom:6px;letter-spacing:.03em}
.rs-row{display:flex;justify-content:space-between;align-items:center;
  padding:7px 0;border-top:1px solid var(--bd);font-size:11px}
.rs-row-dt{color:var(--mt)}
.rs-row-meta{display:flex;gap:10px;color:var(--tx);font-weight:500}
.rs-empty{font-size:12px;color:var(--dm);padding:8px 0}

/* SETTINGS */
.sett-row{margin-bottom:12px}
.sett-lbl{font-size:11px;color:var(--dm);display:block;margin-bottom:7px}
.sett-name-wrap{display:flex;align-items:center;gap:8px}
.sett-divider{height:1px;background:var(--bd);margin:14px 0}
/* DATA BUTTONS */
.data-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.data-btn{padding:11px 0;background:var(--sf);border:none;border-radius:10px;
  font-family:inherit;font-size:11px;font-weight:500;color:var(--mt);
  cursor:pointer;-webkit-tap-highlight-color:transparent}
.data-btn:active{opacity:.6}
.data-btn-danger{background:rgba(255,69,58,.12);color:var(--rd)!important}

/* ── TAB LAYOUT ─────────────────────────────────────────────────────────── */
#app{padding-bottom:0}
.tab-panel{display:none}
.tab-panel.active{display:block;padding-bottom:max(calc(env(safe-area-inset-bottom)+128px),140px)}

/* TAB BAR */
.tab-bar{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:calc(100% - 32px);max-width:388px;
  bottom:max(env(safe-area-inset-bottom),16px);
  margin-bottom:4px;
  background:var(--glass-bg);
  backdrop-filter:blur(28px) saturate(180%);
  -webkit-backdrop-filter:blur(28px) saturate(180%);
  border:1px solid var(--glass-border);
  border-radius:24px;
  display:grid;grid-template-columns:repeat(4,1fr);
  padding:6px 0 8px;
  z-index:90;
  box-shadow:
    0 2px 0 var(--glass-shine) inset,
    0 -1px 0 rgba(0,0,0,.08) inset,
    0 8px 32px var(--glass-shadow),
    0 2px 8px rgba(0,0,0,.15);
}
.tab-btn{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;padding:8px 0 6px;border:none;background:transparent;
  color:var(--dm);font-family:inherit;font-size:9px;font-weight:500;
  letter-spacing:.03em;cursor:pointer;-webkit-tap-highlight-color:transparent;
  transition:color .18s, transform .18s}
.tab-btn svg{transition:transform .18s}
.tab-btn.active{color:var(--ac)}
.tab-btn.active svg{transform:translateY(-1px) scale(1.05)}
.tab-btn:active{opacity:.5;transform:scale(.93)}

/* ── TODAY TAB ──────────────────────────────────────────────────────────── */
.today-date{font-size:13px;color:var(--dm);margin-bottom:16px;font-weight:500}
.today-card{border-radius:14px;padding:20px;margin-bottom:16px;
  display:flex;align-items:center;gap:16px;cursor:pointer;
  -webkit-tap-highlight-color:transparent;transition:opacity .1s}
.today-card:active{opacity:.8}
.today-card-empty{background:var(--sf);border:2px dashed var(--bd)}
.today-card-icon{width:48px;height:48px;border-radius:12px;background:rgba(255,255,255,.15);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:22px}
.today-card-info{flex:1;min-width:0}
.today-card-type{font-size:18px;font-weight:700;color:#fff;line-height:1.1}
.today-card-sub{font-size:12px;color:rgba(255,255,255,.7);margin-top:3px}
.today-card-empty .today-card-type{color:var(--mt)}
.today-card-empty .today-card-sub{color:var(--dm)}
.today-card-chevron{font-size:20px;color:rgba(255,255,255,.5);flex-shrink:0}
.today-card-empty .today-card-chevron{color:var(--dm)}

/* ── STATS TAB ──────────────────────────────────────────────────────────── */
.stats-tab-section{margin-bottom:20px}
.stats-tab-ttl{font-size:11px;font-weight:700;color:var(--dm);
  letter-spacing:.05em;margin-bottom:10px}


/* ── AUTH SCREEN ─────────────────────────────────────────────────────────── */
#syncNudge{
  position:fixed;bottom:calc(max(env(safe-area-inset-bottom),48px) + 12px);left:16px;right:16px;
  z-index:900;
  display:flex;align-items:center;justify-content:space-between;gap:10px;
  background:var(--glass-bg);backdrop-filter:blur(20px) saturate(160%);
  -webkit-backdrop-filter:blur(20px) saturate(160%);
  border:1px solid var(--glass-border);border-radius:16px;
  padding:12px 14px;
  box-shadow:0 4px 24px var(--glass-shadow);
  animation:fadeUp .35s ease;
}
#syncNudge.hidden{display:none}
#syncNudge span{font-size:13px;color:var(--tx);line-height:1.4;flex:1}
#syncNudgeClose{
  background:none;border:none;color:var(--dm);font-size:16px;
  cursor:pointer;padding:4px 6px;-webkit-tap-highlight-color:transparent;flex-shrink:0;
}
#syncNudgeClose:active{opacity:.5}
#authScreen{
  position:fixed;inset:0;z-index:1000;
  background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:32px;
}
#authScreen.hidden{display:none}
.auth-logo{font-size:36px;font-weight:900;color:var(--tx);letter-spacing:-.02em;margin-bottom:8px}
.auth-sub{font-size:14px;color:var(--dm);margin-bottom:40px;text-align:center;line-height:1.5}
.auth-input{
  width:100%;background:var(--glass-bg);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1px solid var(--glass-border);border-radius:14px;
  color:var(--tx);font-family:inherit;font-size:16px;
  padding:16px;outline:none;margin-bottom:12px;text-align:center;
  transition:border-color .2s;
}
.auth-input:focus{border-color:var(--ac)}
.auth-input::placeholder{color:var(--dm)}
.auth-btn{
  width:100%;padding:16px 0;background:var(--ac);border:none;
  border-radius:14px;font-family:inherit;font-size:16px;font-weight:700;
  color:#fff;cursor:pointer;-webkit-tap-highlight-color:transparent;
  transition:opacity .15s;margin-bottom:8px;
  box-shadow:0 4px 20px rgba(79,123,247,.4);
}
.auth-btn:active{opacity:.75}
.auth-btn:disabled{opacity:.4;pointer-events:none}
.auth-msg{font-size:13px;color:var(--dm);text-align:center;min-height:20px;line-height:1.5}
.auth-msg.success{color:var(--gr)}
.auth-msg.error{color:var(--rd)}
.auth-check{
  display:flex;flex-direction:column;align-items:center;gap:16px;
  animation:obFadeIn .4s ease;
}
.auth-check-icon{font-size:48px}
.auth-check-ttl{font-size:20px;font-weight:700;color:var(--tx)}
.auth-check-sub{font-size:14px;color:var(--dm);text-align:center;line-height:1.5}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div id="app">

  <!-- ══════════════════════════════════════════════════════
       TAB 1: DZIŚ
  ══════════════════════════════════════════════════════ -->
  <div class="tab-panel active" data-tab="today">
    <div class="hdr">
      <div class="hdr-l" style="flex-direction:column;align-items:flex-start;gap:2px">
        <div style="font-size:11px;color:var(--dm);font-weight:500" id="todayGreetLbl"></div>
        <div class="today-date" id="todayDateLbl" style="margin-bottom:0;font-size:15px;font-weight:700;color:var(--tx)"></div>
      </div>
      <div class="hdr-r">
        <button class="icon-btn" id="themeBtn"></button>
        <div class="lang-sw">
          <button class="lang-btn" id="btnPL" onclick="setLang('pl')" title="Polski">🇵🇱</button>
          <button class="lang-btn" id="btnEN" onclick="setLang('en')" title="English">🇺🇸</button>
        </div>
      </div>
    </div>
    <div id="todayCard" class="today-card today-card-empty"></div>

    <div class="week-w">
      <div class="week-hdr" id="weekTtl"></div>
      <div class="week-days" id="weekDays"></div>
    </div>
  </div>

  <!-- ══════════════════════════════════════════════════════
       TAB 2: KALENDARZ
  ══════════════════════════════════════════════════════ -->
  <div class="tab-panel" data-tab="calendar">
    <div class="hdr">
      <div class="hdr-l"><span class="logo" id="calLogoEl"></span></div>
      <div class="hdr-r">
        <div class="lang-sw">
          <button class="lang-btn" id="calBtnPL" onclick="setLang('pl')">pl</button>
          <button class="lang-btn" id="calBtnEN" onclick="setLang('en')">en</button>
        </div>
      </div>
    </div>

    <div class="nav">
      <button class="nav-btn" id="prevBtn">←</button>
      <span class="mo-lbl" id="moLbl"></span>
      <button class="nav-btn" id="nextBtn">→</button>
    </div>

    <div class="stats">
      <div class="stat-blk"><span class="stat-n" id="sCount">0</span><span class="stat-l" id="sl1"></span></div>
      <div class="stat-div"></div>
      <div class="stat-blk"><span class="stat-n" id="sPct">0%</span><span class="stat-l" id="sl2"></span></div>
      <div class="stat-div"></div>
      <div class="stat-blk"><span class="stat-n" id="sMissed">0</span><span class="stat-l" id="sl3"></span></div>
    </div>

    <div class="legend" id="legend"></div>
    <div class="calendar" id="calendar"></div>

    <div class="bar-w">
      <div class="bar-track"><div class="bar-fill" id="barFill" style="width:0%"></div></div>
      <div class="goal-row">
        <span class="bar-lbl" id="barLbl"></span>
        <div class="goal-ctrl">
          <button class="goal-step" id="goalMinus">−</button>
          <span class="goal-val" id="goalVal"></span>
          <button class="goal-step" id="goalPlus">+</button>
        </div>
      </div>
    </div>

    <div id="yrView"></div>
  </div>

  <!-- ══════════════════════════════════════════════════════
       TAB 3: STATYSTYKI
  ══════════════════════════════════════════════════════ -->
  <div class="tab-panel" data-tab="stats">
    <div class="hdr">
      <div class="hdr-l"><span class="logo" id="statsLogoEl"></span></div>
    </div>

    <div class="chart-w">
      <div class="chart-hdr">
        <span class="chart-ttl" id="chartTtl"></span>
        <div class="ranges">
          <button class="rbtn" data-r="7d">7d</button>
          <button class="rbtn" data-r="14d">14d</button>
          <button class="rbtn on" data-r="1m">1m</button>
          <button class="rbtn" data-r="3m">3m</button>
          <button class="rbtn" data-r="1y" id="rBtnYr"></button>
        </div>
      </div>
      <svg id="chartBars"></svg>
    </div>

    <div class="cmp-panel" id="cmpPanel" style="margin-top:12px">
      <div class="cmp-pick">
        <button id="cmpPrev">←</button>
        <span id="cmpMoLbl"></span>
        <button id="cmpNext">→</button>
      </div>
      <div class="cmp-cols" id="cmpCols"></div>
    </div>
  </div>

  <!-- ══════════════════════════════════════════════════════
       TAB 4: MENU (profile / settings)
  ══════════════════════════════════════════════════════ -->
  <div class="tab-panel" data-tab="menu">
    <div class="hdr">
      <div class="hdr-l"><span class="logo" id="menuLogoEl"></span></div>
    </div>



    <div class="dblock open">
      <button class="dblock-sum" id="menuStatsTtl"></button>
      <div class="dblock-wrap"><div class="dblock-body" id="menuWorkoutStatsContent"></div></div>
    </div>

    <div class="dblock">
      <button class="dblock-sum" id="menuRunTtl"></button>
      <div class="dblock-wrap"><div class="dblock-body" id="menuRunStatsContent"></div></div>
    </div>

    <div class="dblock">
      <button class="dblock-sum" id="menuTplsTtl"></button>
      <div class="dblock-wrap"><div class="dblock-body" id="menuTplsContent"></div></div>
    </div>

    <div class="dblock">
      <button class="dblock-sum" id="menuAtlasTtl"></button>
      <div class="dblock-wrap"><div class="dblock-body" id="menuAtlasContent"></div></div>
    </div>

    <div class="dblock">
      <button class="dblock-sum" id="menuSettTtl"></button>
      <div class="dblock-wrap">
        <div class="dblock-body">
          <div id="authUserEmailRow" style="font-size:11px;color:var(--dm);margin-bottom:12px;padding:8px 0;border-bottom:1px solid var(--bd);display:none">
            <span id="authUserEmail" style="color:var(--mt)"></span>
          </div>
          <div class="sett-row">
            <span class="sett-lbl" id="menuSettName"></span>
            <div class="sett-name-wrap">
              <input type="text" class="name-inp" id="menuNameInp" maxlength="24"/>
              <button class="name-sv" id="menuNameSv"></button>
            </div>
          </div>
          <div class="sett-divider"></div>
          <div class="data-btns">
            <button class="data-btn" id="menuBtnExport"></button>
            <button class="data-btn" id="menuBtnImport"></button>
          </div>
          <input type="file" id="menuImportInput" accept=".json" style="display:none">

const SUPA_URL='https://mihptpjsewqmviiwvefw.supabase.co';

// ── SUPABASE DATA SYNC ────────────────────────────────────────────────────────
async function dbSave(date,data){
  if(!supaUser)return;
  await supa.from('workouts').upsert(
    {user_id:supaUser.id,date,data,updated_at:new Date().toISOString()},
    {onConflict:'user_id,date'}
  );
}

async function dbDelete(date){
  if(!supaUser)return;
  await supa.from('workouts').delete().eq('user_id',supaUser.id).eq('date',date);
}

async function dbLoadAll(){
  if(!supaUser)return{};
  const {data,error}=await supa.from('workouts').select('date,data').eq('user_id',supaUser.id);
  if(error||!data)return{};
  const out={};
  data.forEach(r=>{out[r.date]=r.data;});
  return out;
}

// ── AUTH LOGIC ────────────────────────────────────────────────────────────────
async function initAuth(){
  // Check existing session (Supabase v2 handles magic link URL tokens automatically)
  const {data:{session}}=await supa.auth.getSession();
  if(session){
    await onSignedIn(session.user);
    return;
  }
  // No session — boot app without login (local-only mode)
  bootApp();
  // Show auth screen only if user explicitly wants to log in

  // Listen for future auth changes
  supa.auth.onAuthStateChange(async(event,session)=>{
    if(event==='SIGNED_IN'&&session){
      await onSignedIn(session.user);
    }
    if(event==='SIGNED_OUT'){
      supaUser=null;
      // Nie wymuś ekranu auth — app działa dalej w trybie local-only
      // Odśwież tylko menu żeby pokazać "zaloguj się" zamiast "wyloguj się"
      drawerReady=false;
      if(activeTab==='menu'){renderMenuTab();drawerReady=true;}
      // Ukryj email usera w menu
      const emailEl=document.getElementById('authUserEmail');
      if(emailEl)emailEl.textContent='';
    }
  });
}

async function onSignedIn(user){
  supaUser=user;
  document.getElementById('authScreen').classList.add('hidden');
  drawerReady=false; // refresh menu to show sign out
  // Load data from Supabase — merge with local (remote wins conflicts, local-only dates pushed up)
  const remoteData=await dbLoadAll();
  const localData=load();
  // Merge: start with local as base, remote overwrites on same date (cloud = canonical)
  const merged={...localData,...remoteData};
  // Zapisz tylko jeśli faktycznie są dane (pusty {} nie powinien nadpisywać stanu nowego usera)
  if(Object.keys(merged).length>0) localStorage.setItem('td',JSON.stringify(merged));
  // Push any local-only dates up to Supabase
  for(const date of Object.keys(localData)){
    if(!remoteData[date]) dbSave(date,localData[date]);
  }
  // Boot lub refresh — jeśli bootApp() nie był jeszcze wywołany (np. magic link od razu dał sesję)
  if(!appBooted){
    bootApp();
  } else {
    renderToday();renderMonth();renderWeek();
    if(activeTab==='stats')renderChart();
    drawerReady=false;
  }
}

function showAuthScreen(){
  document.getElementById('authScreen').classList.remove('hidden');
}

let appBooted=false;
function bootApp(){
  appBooted=true;
  document.getElementById('btnPL').classList.toggle('on',lang==='pl');
  document.getElementById('btnEN').classList.toggle('on',lang==='en');
  applyTheme();
  buildLegend();buildTypePicker();buildIBars();buildRunGrid();
  applyTx();renderMonth();renderWeek();
  switchTab('today');
  wireMenuButtons();
  showSyncNudge();
}

function showSyncNudge(){
  if(supaUser)return; // zalogowany — nie pokazuj
  if(sessionStorage.getItem('nudgeDismissed'))return; // już zamknięty w tej sesji
  const el=document.getElementById('syncNudge');
  if(!el)return;
  set$('syncNudgeMsg',tx('syncNudge'));
  el.classList.remove('hidden');
  document.getElementById('syncNudgeClose').onclick=()=>{
    el.classList.add('hidden');
    sessionStorage.setItem('nudgeDismissed','1');
  };
}

function renderToday(){
  const data=load(),tk_=tk(),entry=norm(data[tk_]);
  const d=new Date();
  const months=tx('months'),days_=tx('days');
  const dow=days_[(d.getDay()===0?6:d.getDay()-1)];
  set$('todayDateLbl',`${dow}, ${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`);
  // greeting in header
  const greetEl=document.getElementById('todayGreetLbl');
  if(greetEl)greetEl.textContent=userName?`${tx('greeting')}, ${userName}!`:'StatsX';
  const card=document.getElementById('todayCard');
  if(!card)return;
  if(entry){
    const type=TM[entry.type];
    card.className='today-card';
    card.style.background=type?type.color:'var(--sf)';
    const exCount=entry.exercises?.length||0;
    const runInfo=entry.run?`${entry.run.km}km`:'';
    const sub=entry.type==='RUN'?runInfo:(exCount?`${exCount} ${tx('exercises')}`:'');
    card.innerHTML=`
      <div class="today-card-icon">${typeIcon(entry.type)}</div>
      <div class="today-card-info">
        <div class="today-card-type">${tx('types.'+entry.type)}</div>
        ${sub?`<div class="today-card-sub">${sub} · ${tx('il')[Math.max(0,(entry.intensity||5)-1)]}</div>`:''}
      </div>
      <div class="today-card-chevron">›</div>`;
    card.onclick=()=>{haptic();openTodaySheet();};
  } else {
    card.className='today-card today-card-empty';
    card.style.background='';
    card.innerHTML=`
      <div class="today-card-icon" style="background:var(--sf2);font-size:20px">+</div>
      <div class="today-card-info">
        <div class="today-card-type">${tx('logWorkout')}</div>
        <div class="today-card-sub">${tx('logWorkoutSub')}</div>
      </div>
      <div class="today-card-chevron" style="color:var(--dm)">›</div>`;
    card.onclick=()=>{haptic();openTodaySheet();};
  }
  renderWeek();
}

// ── HAPTIC ───────────────────────────────────────────────────────────────────
function haptic(style='light'){
  // iOS: use Taptic Engine via webkit API if available
  if(window.webkit?.messageHandlers?.haptic){
    window.webkit.messageHandlers.haptic.postMessage(style);return;
  }
  // Standard vibration API (Android, some browsers)
  if(navigator.vibrate){
    const ms={light:8,medium:14,heavy:22,success:12}[style]||8;
    navigator.vibrate(ms);
  }
}

function animN(id,target,sfx=''){
  const el=document.getElementById(id);if(!el)return;
  const start=parseInt(el.textContent)||0;
  if(start===target){el.textContent=target+sfx;return;}
  const dur=400,t0=performance.now();
  const step=now=>{const p=Math.min((now-t0)/dur,1),e=1-(1-p)**3;
    el.textContent=Math.round(start+(target-start)*e)+sfx;
    if(p<1)requestAnimationFrame(step);};
  requestAnimationFrame(step);
}

// ── STREAK ───────────────────────────────────────────────────────────────────
function calcStreak(){
  const data=load();let s=0,d=new Date(today);
  if(!norm(data[gk(d.getFullYear(),d.getMonth(),d.getDate())]))d.setDate(d.getDate()-1);
  for(let i=0;i<400;i++){
    if(!norm(data[gk(d.getFullYear(),d.getMonth(),d.getDate())]))break;
    s++;d.setDate(d.getDate()-1);
  }
  return s;
}

let tpIdx=0; // real index 0..N-1, internal offset by N (clone set)
const TP_CLONES=1; // clones on each side
function buildTypePicker(){
  const track=document.getElementById('tpTrack');if(!track)return;
  track.innerHTML='';
  const n=TYPES.length;
  // build clone*start + real + clone*end
  const all=[...Array(TP_CLONES*n)].map((_,i)=>TYPES[i%n])
    .concat(TYPES)
    .concat([...Array(TP_CLONES*n)].map((_,i)=>TYPES[i%n]));
  all.forEach(t=>{
    const card=document.createElement('div');card.className='tp-card';
    card.style.background=t.color;
    card.innerHTML=tx('types.'+t.id)+'<span class="tp-sub">'+t.short+'</span>';
    track.appendChild(card);
  });
  const idx=sType?TYPES.findIndex(t=>t.id===sType):0;
  tpIdx=idx>=0?idx:0;
  movePicker(false);
}
function movePicker(anim){
  const track=document.getElementById('tpTrack');if(!track)return;
  const n=TYPES.length, offset=TP_CLONES*n;
  const pos=offset+tpIdx; // position in the extended track
  track.style.transition=anim?'transform .3s cubic-bezier(.32,.72,0,1)':'none';
  track.style.transform=`translateX(-${pos*100}%)`;
  sType=TYPES[tpIdx].id;
  // after transition, silently reset if we're in clone territory
  if(anim){
    setTimeout(()=>{
      track.style.transition='none';
      track.style.transform=`translateX(-${pos*100}%)`;
    },320);
  }
  syncSecs();syncBarColor();
  // update glow on current card
  const cards=track.querySelectorAll('.tp-card');
  cards.forEach((c,i)=>{
    const isActive=(i===(offset+tpIdx));
    c.style.boxShadow=isActive?`0 0 28px rgba(0,0,0,.4),0 2px 0 rgba(255,255,255,.2) inset`:'none';
    c.style.transform=isActive?'scaleY(1.04)':'scaleY(1)';
    c.style.transition='transform .25s, box-shadow .25s';
  });
}
function syncSecs(){

// ── STEPPER ──────────────────────────────────────────────────────────────────
function mkStep(containerId,obj,field,min,max,step){
  const el=document.getElementById(containerId);if(!el)return;
  el.innerHTML='';
  const w=document.createElement('div');w.className='stepper';
  const m=document.createElement('button');m.className='step-btn';m.textContent='−';
  const d=document.createElement('span');d.className='step-val';d.textContent=fs(obj[field],step);
  const p=document.createElement('button');p.className='step-btn';p.textContent='+';
  m.addEventListener('click',()=>{obj[field]=Math.max(min,Math.round((obj[field]-step)*100)/100);d.textContent=fs(obj[field],step);});
  p.addEventListener('click',()=>{obj[field]=Math.min(max,Math.round((obj[field]+step)*100)/100);d.textContent=fs(obj[field],step);});
  w.append(m,d,p);el.appendChild(w);
}
function mkStepEl(val,min,max,step,cb){
  let v=val;const w=document.createElement('div');w.className='stepper';
  const m=document.createElement('button');m.className='step-btn';m.textContent='−';
  const d=document.createElement('span');d.className='step-val';d.textContent=fs(v,step);
  const p=document.createElement('button');p.className='step-btn';p.textContent='+';
  m.addEventListener('click',()=>{v=Math.max(min,Math.round((v-step)*100)/100);d.textContent=fs(v,step);cb(v);});
  p.addEventListener('click',()=>{v=Math.min(max,Math.round((v+step)*100)/100);d.textContent=fs(v,step);cb(v);});
  w.append(m,d,p);return w;
}

// ── EXERCISE HISTORY ─────────────────────────────────────────────────────────
function getHist(name,all=false){
  if(!name.trim())return all?[]:null;
  const data=load(),res=[];
  Object.entries(data).sort().forEach(([key,raw])=>{
    if(key===aKey)return;
    const e=norm(raw);if(!e?.exercises)return;
    const match=e.exercises.find(x=>x.name?.toLowerCase().trim()===name.toLowerCase().trim());
    if(match)res.push({date:key,...match});
  });
  if(all)return res; // chronological
  return res.length?res[res.length-1]:null; // most recent
}
function fmtDK(key){const[,m,d]=key.split('-').map(Number);return`${d} ${tx('ms')[m-1]}`;}

let acInp=null;
function showAC(inp,q){
  const drop=document.getElementById('acDrop');
  if(!q.trim()){drop.style.display='none';return;}
  const hits=EXERCISES.filter(e=>e.toLowerCase().includes(q.toLowerCase())).slice(0,6);
  if(!hits.length){drop.style.display='none';return;}
  const r=inp.getBoundingClientRect();
  drop.style.cssText=`display:block;left:${r.left}px;top:${r.bottom+3}px;width:${Math.max(r.width,200)}px`;
  drop.innerHTML='';
  hits.forEach(name=>{
    const it=document.createElement('div');it.className='ac-it';
    const idx=name.toLowerCase().indexOf(q.toLowerCase());
    it.innerHTML=name.slice(0,idx)+`<span class="ac-hl">${name.slice(idx,idx+q.length)}</span>`+name.slice(idx+q.length);
    const pick=()=>{inp.value=name;pEx.name=name;drop.style.display='none';updExHist(name);};
    it.addEventListener('mousedown',e=>{e.preventDefault();pick();});
    it.addEventListener('touchstart',e=>{e.preventDefault();pick();},{passive:false});
    drop.appendChild(it);
  });
  acInp=inp;
}
function hideAC(){document.getElementById('acDrop').style.display='none';acInp=null;}

function initExInput(data){
  pEx={name:data?.name||'',sets:data?.sets||3,reps:data?.reps||10,weight:data?.weight||60};
  const inp=document.getElementById('exInp');if(!inp)return;
  inp.value=pEx.name;
  mkStep('stepSets',pEx,'sets',1,10,1);
  mkStep('stepReps',pEx,'reps',1,50,1);
  mkStep('stepKg',pEx,'weight',0,300,2.5);
  const btn=document.getElementById('exCfm');
  if(btn){btn.textContent=editIdx>=0?'✓':'+';btn.classList.toggle('edit',editIdx>=0);}
  updExHist(pEx.name);
}
function updExHist(name){
  const el=document.getElementById('exHist');if(!el)return;
  if(!name.trim()){el.innerHTML='';return;}
  const history=getHist(name,true);
  const latest=history.length?history[history.length-1]:null;
  if(!latest){el.innerHTML='';return;}
  // sparkline
  let sparkHtml='';
  if(history.length>=3){
    const weights=history.map(h=>h.weight).filter(w=>w>0);
    if(weights.length>=3){
      const mn=Math.min(...weights),mx=Math.max(...weights),rng=mx-mn||1;
      const W=64,H=20,pad=2,step=(W-pad*2)/(weights.length-1);
      const pts=weights.map((w,i)=>`${pad+i*step},${H-pad-(w-mn)/rng*(H-pad*2)}`).join(' ');
      const trend=weights[weights.length-1]>=weights[0]?'#30d158':'#ff453a';
      sparkHtml=`<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" style="flex-shrink:0">
        <polyline points="${pts}" fill="none" stroke="${trend}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="${pad+(weights.length-1)*step}" cy="${H-pad-(weights[weights.length-1]-mn)/rng*(H-pad*2)}" r="2.5" fill="${trend}"/>
      </svg>`;
    }
  }
  const diff=history.length>=2?latest.weight-history[history.length-2].weight:0;
  const diffHtml=diff!==0?`<span style="font-size:9px;color:${diff>0?'#30d158':'#ff453a'};margin-left:2px">${diff>0?'+':''}${diff}kg</span>`:'';
  el.innerHTML=`<div class="ex-hist-card">
    <div style="flex:1;min-width:0">
      <div style="display:flex;align-items:baseline;gap:3px">
        <span class="ex-hist-weight">${latest.weight}</span><span class="ex-hist-unit">kg</span>${diffHtml}
      </div>
      <div class="ex-hist-sets">${latest.sets} × ${latest.reps} reps</div>
      <div class="ex-hist-date">${fmtDK(latest.date)}</div>
    </div>
    ${sparkHtml}
  </div>`;
}

function getLastWorkout(){

  const data=load();
  const past=Object.entries(data)
    .filter(([k,e])=>k!==aKey&&norm(e)?.type===sType&&norm(e)?.exercises?.length)
    .sort((a,b)=>b[0].localeCompare(a[0]));
  if(!past.length)return null;
  const [date,entry]=past[0];
  return{date,exercises:norm(entry).exercises};
}

function getChartData(){
  const data=load(),tk_=tk(),res=[];
  const dAt=off=>{const d=new Date(today);d.setDate(d.getDate()-off);return d;};
  const ent=d=>norm(data[gk(d.getFullYear(),d.getMonth(),d.getDate())]);
  if(chartRange==='7d'||chartRange==='14d'){
    const n=chartRange==='7d'?7:14;
    for(let i=n-1;i>=0;i--){const d=dAt(i),e=ent(d);const k=gk(d.getFullYear(),d.getMonth(),d.getDate());res.push({lbl:d.getDate()+'/'+(d.getMonth()+1),val:e?(e.intensity||5):0,hit:!!e,dateKey:k,type:e?.type||null});}
  } else if(chartRange==='1m'){
    for(let i=29;i>=0;i--){const d=dAt(i),e=ent(d);const k=gk(d.getFullYear(),d.getMonth(),d.getDate());res.push({lbl:i%6===0?String(d.getDate()):'',val:e?(e.intensity||5):0,hit:!!e,dateKey:k,type:e?.type||null});}
  } else if(chartRange==='3m'){
    for(let w=12;w>=0;w--){
      const vals=[];let lbl='';
      for(let di=6;di>=0;di--){const d=dAt(w*7+di);if(gk(d.getFullYear(),d.getMonth(),d.getDate())>tk_)continue;const e=ent(d);if(e)vals.push(e.intensity||5);if(di===6)lbl=w%3===0?(d.getMonth()+1)+'/'+d.getDate():'';}
      res.push({lbl,val:vals.length?vals.reduce((a,b)=>a+b,0)/vals.length:0,hit:vals.length>0});
    }
  } else {
    for(let mo=11;mo>=0;mo--){
      const d=new Date(today.getFullYear(),today.getMonth()-mo,1),y=d.getFullYear(),m=d.getMonth(),days=dim(y,m),vals=[];
      for(let day=1;day<=days;day++){const k=gk(y,m,day);if(k>tk_)break;const e=norm(data[k]);if(e)vals.push(e.intensity||5);}
      res.push({lbl:tx('ms')[m],val:vals.length?vals.reduce((a,b)=>a+b,0)/vals.length:0,hit:vals.length>0});
    }
  }
  return res;
}
function renderChart(){
  const ps=getChartData(),svg=document.getElementById('chartBars');
  svg.innerHTML='';
  if(!ps.length)return;
  const W=svg.clientWidth||360,H=80,PL=4,PR=4,PT=6,PB=18;
  const cW=W-PL-PR,cH=H-PT-PB,n=ps.length;
  const step=n>1?cW/(n-1):cW;
  const NS='http://www.w3.org/2000/svg';
  svg.setAttribute('viewBox',`0 0 ${W} ${H}`);
  const defs=document.createElementNS(NS,'defs');
  ['up','dn'].forEach(k=>{
    const g=document.createElementNS(NS,'linearGradient');
    g.setAttribute('id','cg-'+k);g.setAttribute('gradientUnits','userSpaceOnUse');
    g.setAttribute('x1','0');g.setAttribute('y1',PT);g.setAttribute('x2','0');g.setAttribute('y2',PT+cH);
    const s1=document.createElementNS(NS,'stop');s1.setAttribute('offset','0%');
    s1.setAttribute('stop-color',k==='up'?'#30d158':'#ff453a');s1.setAttribute('stop-opacity','.18');
    const s2=document.createElementNS(NS,'stop');s2.setAttribute('offset','100%');
    s2.setAttribute('stop-color',k==='up'?'#30d158':'#ff453a');s2.setAttribute('stop-opacity','0');
    g.append(s1,s2);defs.appendChild(g);
  });
  svg.appendChild(defs);
  const pts=ps.map((p,i)=>({x:PL+i*step,y:p.hit?PT+(1-p.val/10)*cH:PT+cH,p}));
  const hitPts=pts.filter(pt=>pt.p.hit);
  if(hitPts.length>1){
    const last=hitPts[hitPts.length-1],first=hitPts[0];
    const up=last.p.val>=first.p.val;
    const area=document.createElementNS(NS,'path');
    const d=pts.map((pt,i)=>(i===0?`M${pt.x},${pt.y}`:`L${pt.x},${pt.y}`)).join(' ')
      +` L${pts[n-1].x},${PT+cH} L${pts[0].x},${PT+cH} Z`;
    area.setAttribute('d',d);area.setAttribute('fill',`url(#cg-${up?'up':'dn'})`);
    svg.appendChild(area);
  }
  [0,.5,1].forEach(t=>{
    const y=PT+t*cH,line=document.createElementNS(NS,'line');
    line.setAttribute('x1',PL);line.setAttribute('y1',y);line.setAttribute('x2',W-PR);line.setAttribute('y2',y);
    line.setAttribute('stroke','rgba(128,128,128,0.1)');line.setAttribute('stroke-width','0.5');
    svg.appendChild(line);
  });
  for(let i=1;i<pts.length;i++){
    const a=pts[i-1],b=pts[i];
    const color=!b.p.hit?'#ff453a':!a.p.hit||b.p.val>=a.p.val?'#30d158':'#ff453a';
    const line=document.createElementNS(NS,'line');
    line.setAttribute('x1',a.x);line.setAttribute('y1',a.y);line.setAttribute('x2',b.x);line.setAttribute('y2',b.y);
    line.setAttribute('stroke',color);line.setAttribute('stroke-width','1.8');line.setAttribute('stroke-linecap','round');
    svg.appendChild(line);
  }
  pts.forEach((pt,i)=>{
    if(!pt.p.hit)return;
    const color=i===0||!pts[i-1].p.hit?'#30d158':pt.p.val>=pts[i-1].p.val?'#30d158':'#ff453a';
    const c=document.createElementNS(NS,'circle');
    c.setAttribute('cx',pt.x);c.setAttribute('cy',pt.y);c.setAttribute('r',n>20?'1.2':'2');
    c.setAttribute('fill',color);svg.appendChild(c);
  });
  ps.forEach((p,i)=>{
    if(!p.lbl)return;
    const x=PL+i*step,t=document.createElementNS(NS,'text');
    t.setAttribute('x',x);t.setAttribute('y',H-3);t.setAttribute('text-anchor','middle');
    t.setAttribute('font-size','7');t.setAttribute('font-family','-apple-system,sans-serif');
    t.setAttribute('fill','rgba(142,142,147,0.75)');t.textContent=p.lbl;
    svg.appendChild(t);
  });
  // ── TOOLTIP HIT AREAS ────────────────────────────────────────────────────
  const months=tx('months'),msArr=tx('ms');
  pts.forEach((pt,i)=>{
    if(!pt.p.hit)return;
    // wide invisible hit rect for each point
    const hit=document.createElementNS(NS,'rect');
    const hw=Math.max(18,step/2);
    hit.setAttribute('x',pt.x-hw/2);hit.setAttribute('y',PT);
    hit.setAttribute('width',hw);hit.setAttribute('height',cH+10);
    hit.setAttribute('fill','transparent');
    hit.style.cursor='pointer';
    const showTip=(e)=>{
      haptic();
      const lbl=pt.p.lbl;
      const tt=document.getElementById('chartTooltip');
      set$('ctVal',`${pt.p.val.toFixed(1)} / 10`);
      set$('ctType',pt.p.type?tx('types.'+pt.p.type):'');
      // format date label
      if(pt.p.dateKey){
        const[,m,d]=pt.p.dateKey.split('-').map(Number);
        set$('ctDate',`${d} ${msArr[m-1]}`);
      } else {
        set$('ctDate',lbl||'');
      }
      // position tooltip above finger
      const bRect=document.getElementById('chartBars').getBoundingClientRect();
      const cx=bRect.left+(pt.x/W)*bRect.width;
      const cy=bRect.top+(pt.y/H)*bRect.height;
      const ttW=120,ttH=52;
      let tx_=cx-ttW/2,ty_=cy-ttH-10;
      if(tx_<8)tx_=8;
      if(tx_+ttW>window.innerWidth-8)tx_=window.innerWidth-8-ttW;
      if(ty_<8)ty_=8;
      tt.style.left=tx_+'px';tt.style.top=ty_+'px';
      tt.classList.add('show');
      clearTimeout(tt._hide);tt._hide=setTimeout(()=>tt.classList.remove('show'),2500);
    };
    hit.addEventListener('click',showTip);
    hit.addEventListener('touchstart',showTip,{passive:true});
    svg.appendChild(hit);
  });

  svg.style.opacity='0';svg.style.transition='opacity .4s ease';
  requestAnimationFrame(()=>svg.style.opacity='1');
}

  b.addEventListener('click',()=>{chartRange=b.dataset.r;document.querySelectorAll('.rbtn').forEach(x=>x.classList.remove('on'));b.classList.add('on');renderChart();});

function mStats(y,m){
  const data=load(),tk_=tk(),daysIn=dim(y,m);
  let trained=0,past=0,totInt=0,tc={};
  for(let d=1;d<=daysIn;d++){
    const key=gk(y,m,d);if(key>tk_)break;past++;
    const e=norm(data[key]);if(e){trained++;if(e.intensity)totInt+=e.intensity;tc[e.type]=(tc[e.type]||0)+1;}
  }
  const top=Object.entries(tc).sort((a,b)=>b[1]-a[1])[0];
  return{trained,past,avgInt:trained?Math.round(totInt/trained*10)/10:0,topId:top?top[0]:null};
}

function renderAtlas(containerId){
  const cont=document.getElementById(containerId||'atlasContent');if(!cont)return;
  cont.innerHTML='';
  const groups=tx('atlasG');
  Object.entries(ATLAS).forEach(([key,exercises])=>{
    const det=document.createElement('div');det.className='atlas-grp';
    const sum=document.createElement('button');sum.className='atlas-sum';sum.type='button';
    sum.textContent=groups[key]||key;
    sum.addEventListener('click',()=>det.classList.toggle('open'));
    const items=document.createElement('div');items.className='atlas-items';
    exercises.forEach(name=>{
      const it=document.createElement('div');it.className='atlas-it';it.textContent=name;
      it.addEventListener('click',()=>{
        closeDrawer();
        const d=new Date(),key2=gk(d.getFullYear(),d.getMonth(),d.getDate());
        const entry=norm(load()[key2]);
        openSheet(key2,`${d.getDate()} ${tx('months')[d.getMonth()]} ${d.getFullYear()}`,entry);
        setTimeout(()=>{const inp=document.getElementById('exInp');if(inp){inp.value=name;pEx.name=name;updExHist(name);}},80);
      });

    });
    det.append(sum,items);cont.appendChild(det);
    // keep closed by default
  });
}

function renderTplsDrawer(containerId){
  const cont=document.getElementById(containerId||'tplsDrawerContent');if(!cont)return;
  cont.innerHTML='';
  const data=load();
  const saved=ldTpls();
  // Saved templates
  if(saved.length){
    const ttl=document.createElement('div');
    ttl.style.cssText='font-size:10px;font-weight:600;color:var(--dm);margin-bottom:8px';
    ttl.textContent=tx('savedTpls');cont.appendChild(ttl);
    saved.forEach((tpl,i)=>{
      const row=document.createElement('div');
      row.style.cssText='display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--bd)';
      const names=tpl.exercises.slice(0,2).map(e=>e.name).join(', ')+(tpl.exercises.length>2?'…':'');
      row.innerHTML=`<div>
        <div style="font-size:12px;font-weight:600;color:var(--tx)">${tpl.name}</div>
        <div style="font-size:10px;color:var(--dm);margin-top:1px">${names}</div>
      </div>`;
      const del=document.createElement('button');
      del.style.cssText='background:none;border:none;color:var(--dm);font-size:14px;cursor:pointer;padding:2px 6px';
      del.textContent='×';
      del.addEventListener('click',()=>{const t=ldTpls();t.splice(i,1);svTpls(t);renderTplsDrawer();});
      row.appendChild(del);cont.appendChild(row);
    });
    const sp=document.createElement('div');sp.style.height='14px';cont.appendChild(sp);
  }
  // Recent workouts by type

  const seen=new Set();
  const recents=Object.entries(data).sort((a,b)=>b[0].localeCompare(a[0]));
  recents.forEach(([date,raw])=>{
    const e=norm(raw);
    if(!e||e.type==='RUN'||!e.exercises?.length||seen.has(e.type))return;
    seen.add(e.type);
    const type=TM[e.type];if(!type)return;
    const row=document.createElement('div');
    row.style.cssText='display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--bd);cursor:pointer;-webkit-tap-highlight-color:transparent';
    const dot=document.createElement('div');dot.style.cssText=`width:8px;height:8px;border-radius:50%;background:${type.color};flex-shrink:0`;
    const info=document.createElement('div');info.style.cssText='flex:1;min-width:0';
    const names=e.exercises.slice(0,2).map(x=>x.name).join(', ')+(e.exercises.length>2?'…':'');
    info.innerHTML=`<div style="font-size:12px;font-weight:600;color:var(--tx)">${tx('types.'+e.type)} <span style="font-size:10px;color:var(--dm);font-weight:400">${fmtDK(date)}</span></div>
      <div style="font-size:10px;color:var(--dm);margin-top:1px">${names}</div>`;
    const load2=document.createElement('button');
    load2.style.cssText='background:var(--sf);border:none;border-radius:6px;padding:5px 10px;font-family:inherit;font-size:10px;color:var(--mt);cursor:pointer;white-space:nowrap;-webkit-tap-highlight-color:transparent';
    load2.textContent=tx('loadTpl');
    load2.addEventListener('click',()=>{
      closeDrawer();
      // open today's sheet with this type pre-selected
      const d=new Date(),key2=gk(d.getFullYear(),d.getMonth(),d.getDate());
      const todayEntry=norm(load()[key2]);
      openSheet(key2,`${d.getDate()} ${tx('months')[d.getMonth()]} ${d.getFullYear()}`,todayEntry);
      setTimeout(()=>{
        const ti=TYPES.findIndex(t=>t.id===e.type);
        if(ti>=0){tpIdx=ti;movePicker(false);}
        sEx=JSON.parse(JSON.stringify(e.exercises));
        editIdx=-1;initExInput();renderExList();updateTplBtn();renderLastWorkoutBtn();
      },80);
    });
    row.append(dot,info,load2);cont.appendChild(row);
  });
  if(seen.size===0&&!saved.length){
    cont.innerHTML=`<div style="font-size:12px;color:var(--dm);padding:4px 0">${tx('noTpls')}</div>`;
  }
}

function renderRunStats(containerId){
  const cont=document.getElementById(containerId||'runStatsContent');if(!cont)return;
  const data=load();
  const runs=Object.entries(data)
    .filter(([,e])=>norm(e)?.type==='RUN'&&norm(e)?.run?.km)
    .map(([date,e])=>({date,...norm(e).run}))
    .sort((a,b)=>b.date.localeCompare(a.date));
  if(!runs.length){cont.innerHTML=`<div class="rs-empty">${tx('noRuns')}</div>`;return;}
  const totalKm=runs.reduce((s,r)=>s+(r.km||0),0);
  const totalMin=runs.reduce((s,r)=>s+(r.hours||0)*60+(r.minutes||0),0);
  const avgSec=totalKm>0?(totalMin*60)/totalKm:0;
  const fmtP=s=>{if(!s)return'—';return`${Math.floor(s/60)}:${String(Math.round(s%60)).padStart(2,'0')}/km`;};
  cont.innerHTML=`
    <div class="rs-grid">
      <div class="rs-card accent-card"><div class="rs-val accent">${runs.length}</div><div class="rs-lbl">${tx('totalRuns')}</div></div>
      <div class="rs-card accent-card"><div class="rs-val accent">${totalKm.toFixed(1)} km</div><div class="rs-lbl">${tx('totalKm')}</div></div>
      <div class="rs-card accent-card"><div class="rs-val accent">${fmtP(avgSec)}</div><div class="rs-lbl">${tx('avgPace')}</div></div>
      <div class="rs-card accent-card"><div class="rs-val accent">${(totalKm/runs.length).toFixed(1)} km</div><div class="rs-lbl">${tx('avgDist')}</div></div>
    </div>
    <div class="rs-log-ttl">${tx('lastRuns')}</div>
    ${runs.slice(0,5).map(r=>{const tot=(r.hours||0)*60+(r.minutes||0);const pace=r.km>0?fmtP((tot*60)/r.km):'—';return`<div class="rs-row"><span class="rs-row-dt">${fmtDK(r.date)}</span><div class="rs-row-meta"><span>${r.km} km</span><span>${pace}</span></div></div>`}).join('')}`;
}

// Boot is triggered by initAuth() after session check
function wireMenuButtons(){
// wire menu tab buttons
document.getElementById('menuBtnExport').addEventListener('click',()=>{
  const d=new Date(),blob=new Blob([JSON.stringify(load(),null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob),a=document.createElement('a');
  a.href=url;a.download=`trening-${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}.json`;
  a.click();URL.revokeObjectURL(url);
});
document.getElementById('menuBtnImport').addEventListener('click',()=>document.getElementById('menuImportInput').click());
document.getElementById('menuImportInput').addEventListener('change',e=>{
  const file=e.target.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(typeof d!=='object')throw 0;saveD(d);drawerReady=false;renderMonth();renderWeek();renderToday();}catch{alert('Invalid file');}};
  r.readAsText(file);e.target.value='';
});
document.getElementById('menuBtnClear').addEventListener('click',()=>{
  if(!confirm(tx('clearConfirm')))return;
  localStorage.removeItem('td');drawerReady=false;renderMonth();renderWeek();renderToday();
});
document.getElementById('menuBtnSignIn').addEventListener('click',()=>{
  document.getElementById('authScreen').classList.remove('hidden');
  document.getElementById('authForm').style.display='flex';
  document.getElementById('authCheck').style.display='none';
  document.getElementById('authSendBtn').disabled=false;
  document.getElementById('authSendBtn').textContent=lang==='pl'?'wyślij link':'send link';
  document.getElementById('authEmail').value='';
});
document.getElementById('menuBtnSignOut').addEventListener('click',async()=>{
  await supa.auth.signOut();
  // Dane zostają lokalnie — app działa w trybie offline/local do następnego logowania
  // supaUser=null i refresh menu obsługuje onAuthStateChange('SIGNED_OUT')
});
document.getElementById('menuNameSv').addEventListener('click',()=>{
  const v=document.getElementById('menuNameInp').value.trim();if(!v)return;
  userName=v;localStorage.setItem('uname',v);set$('menuGreetHi',tx('greeting')+', '+v+'!');
});
document.getElementById('menuNameInp').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('menuNameSv').click();});
} // end wireMenuButtons

// ── AUTH SCREEN WIRING ────────────────────────────────────────────────────────
document.getElementById('authSendBtn').addEventListener('click',async()=>{
  const email=document.getElementById('authEmail').value.trim();
  if(!email||!email.includes('@')){
    const msg=document.getElementById('authMsg');
    msg.textContent='Wpisz poprawny adres email.';msg.className='auth-msg error';return;
  }
  const btn=document.getElementById('authSendBtn');
  btn.disabled=true;btn.textContent='wysyłanie...';
  const redirectTo=window.location.origin+window.location.pathname;
  const {error}=await supa.auth.signInWithOtp({email,options:{emailRedirectTo:redirectTo}});
  if(error){
    btn.disabled=false;btn.textContent='wyślij link';
    const msg=document.getElementById('authMsg');
    msg.textContent='Błąd: '+error.message;msg.className='auth-msg error';
  } else {
    document.getElementById('authEmailSent').textContent=email;
    document.getElementById('authForm').style.display='none';
    document.getElementById('authCheck').style.display='flex';
  }
});
document.getElementById('authEmail').addEventListener('keydown',e=>{
  if(e.key==='Enter')document.getElementById('authSendBtn').click();
});

// sync handled in afterSave()

// ── START ────────────────────────────────────────────────────────────────────
initAuth(); // auth enabled — magic link via Supabase
