let bwEdit=null;

function renderBWCard(){
  const cont=document.getElementById('bwCard');if(!cont)return;
  const data=loadBW();
  const keys=Object.keys(data).sort();
  const lastKey=keys.length?keys[keys.length-1]:null;
  const lastVal=lastKey!=null?data[lastKey]:null;
  if(bwEdit===null)bwEdit=lastVal||80;

  // sparkline last 60 days
  const sparkIdx=[],sparkVals=[];
  for(let i=59;i>=0;i--){
    const d=new Date(today);d.setDate(d.getDate()-i);
    const k=gk(d.getFullYear(),d.getMonth(),d.getDate());
    if(data[k]!=null){sparkIdx.push(59-i);sparkVals.push(data[k]);}
  }
  let sparkHtml='';
  if(sparkVals.length>=2){
    const W=72,H=26,pad=2;
    const mn=Math.min(...sparkVals),mx=Math.max(...sparkVals),rng=mx-mn||0.5;
    const step=(W-pad*2)/59;
    const ptStr=sparkIdx.map((si,j)=>`${pad+si*step},${H-pad-(sparkVals[j]-mn)/rng*(H-pad*2)}`).join(' ');
    const lastSI=sparkIdx[sparkIdx.length-1];
    const lastY=H-pad-(sparkVals[sparkVals.length-1]-mn)/rng*(H-pad*2);
    const trendClr=sparkVals[sparkVals.length-1]<=sparkVals[0]?'#30d158':'#ff9f0a';
    sparkHtml=`<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" style="flex-shrink:0;opacity:.9">
      <polyline points="${ptStr}" fill="none" stroke="${trendClr}" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="${pad+lastSI*step}" cy="${lastY}" r="2.5" fill="${trendClr}"/>
    </svg>`;
  }

  const todayKey=tk(),todayLogged=data[todayKey]!=null;
  const pl=lang==='pl';
  cont.innerHTML=`
    <div class="bw-left">
      <div style="display:flex;align-items:baseline;gap:4px">
        <span class="bw-val">${lastVal!=null?lastVal:'—'}</span><span class="bw-unit">kg</span>
        ${lastKey&&lastKey!==todayKey?`<span style="font-size:9px;color:var(--dm);margin-left:2px">${fmtDK(lastKey)}</span>`:''}
      </div>
      <div class="bw-date">${pl?'masa ciała':'body weight'}</div>
      <div class="bw-inp-row">
        <button class="bw-btn" id="bwMinus">−</button>
        <span class="bw-curr-val" id="bwCurrVal">${bwEdit}</span>
        <button class="bw-btn" id="bwPlus">+</button>
        <button class="bw-save-btn" id="bwSaveBtn">${todayLogged?'✓ '+(pl?'dziś':'today'):(pl?'zapisz':'save')}</button>
      </div>
    </div>
    ${sparkHtml}
  `;
  const upd=()=>{const el=document.getElementById('bwCurrVal');if(el)el.textContent=bwEdit;};
  document.getElementById('bwMinus').addEventListener('click',()=>{bwEdit=Math.max(30,Math.round((bwEdit-0.5)*10)/10);upd();haptic();});
  document.getElementById('bwPlus').addEventListener('click',()=>{bwEdit=Math.min(300,Math.round((bwEdit+0.5)*10)/10);upd();haptic();});
  document.getElementById('bwSaveBtn').addEventListener('click',()=>{
    const d=loadBW();d[tk()]=bwEdit;saveBW(d);haptic('success');renderBWCard();
  });
}

// ── COMPOUND LIFTS ───────────────────────────────────────────────────────────
const COMPOUNDS=[
  {key:'Bench Press',short:'Bench'},
  {key:'Squat',short:'Squat'},
  {key:'Deadlift',short:'DL'}
];

function getCompoundHist(name){
  const data=load(),res=[];
  Object.entries(data).sort((a,b)=>a[0].localeCompare(b[0])).forEach(([key,raw])=>{
    const e=norm(raw);if(!e?.exercises)return;
    const ex=e.exercises.find(x=>x.name?.toLowerCase().trim()===name.toLowerCase());
    if(!ex)return;
    let maxW=0;
    if(Array.isArray(ex.sets))maxW=Math.max(...ex.sets.map(s=>s.w||0),0);
    else maxW=ex.weight||0;
    if(maxW>0)res.push({key,weight:maxW});
  });
  return res;
}

function renderCompoundRow(){
  const cont=document.getElementById('compoundRow');if(!cont)return;
  cont.innerHTML='';
  const pl=lang==='pl';
  COMPOUNDS.forEach(({key,short})=>{
    const hist=getCompoundHist(key);
    const card=document.createElement('div');card.className='compound-card';
    if(!hist.length){
      card.innerHTML=`<div class="compound-name">${short}</div>
        <div class="compound-val" style="font-size:16px;color:var(--dm)">—</div>
        <div class="compound-diff neu">${pl?'brak':'no data'}</div>`;
    } else {
      const last=hist[hist.length-1];
      const prev=hist.length>=2?hist[hist.length-2]:null;
      const allMax=Math.max(...hist.map(h=>h.weight));
      const isPR=last.weight===allMax&&hist.length>=2;
      let diffHtml='<div class="compound-diff neu"> </div>';
      if(prev){
        const d=last.weight-prev.weight;
        if(d>0)diffHtml=`<div class="compound-diff up">+${d}kg</div>`;
        else if(d<0)diffHtml=`<div class="compound-diff dn">${d}kg</div>`;
        else diffHtml=`<div class="compound-diff neu">=</div>`;
      }
      card.innerHTML=`
        <div class="compound-name">${short}</div>
        <div class="compound-val">${last.weight}<span class="compound-unit">kg</span></div>
        ${diffHtml}
        ${isPR?'<div class="compound-pr">PR 🏆</div>':''}
      `;
    }
    cont.appendChild(card);
  });
}

// ── REST TIMER ───────────────────────────────────────────────────────────────
let rtInterval=null,rtRemaining=0,rtTotal=90;
const RT_PRESETS=[60,90,120,180];

function startRestTimer(){
  // Only start if sheet is open (user is logging a workout)
  if(!document.getElementById('sheet').classList.contains('on'))return;
  rtRemaining=rtTotal;
  clearInterval(rtInterval);
  updateRTDisplay();
  document.getElementById('restTimer').classList.add('on');
  rtInterval=setInterval(()=>{
    rtRemaining--;
    updateRTDisplay();
    if(rtRemaining<=0){
      clearInterval(rtInterval);
      haptic('heavy');
      setTimeout(stopRestTimer,3500);
    }
  },1000);
}

function stopRestTimer(){
  clearInterval(rtInterval);
  document.getElementById('restTimer').classList.remove('on');
}

function updateRTDisplay(){
  const el=document.getElementById('rtTime'),fill=document.getElementById('rtFill');
  if(!el||!fill)return;
  if(rtRemaining<=0){
    el.textContent='✓';el.className='rt-time done';
    fill.style.width='100%';fill.style.background='#30d158';
  } else {
    const m=Math.floor(rtRemaining/60),s=rtRemaining%60;
    el.textContent=`${m}:${String(s).padStart(2,'0')}`;
    el.className='rt-time'+(rtRemaining<=10?' urgent':rtRemaining<=30?' warning':'');
    fill.style.width=((rtRemaining/rtTotal)*100)+'%';
    fill.style.background=rtRemaining<=10?'#ff453a':rtRemaining<=30?'#ff9f0a':'var(--ac)';
  }
  // sync preset active state
  RT_PRESETS.forEach(p=>{
    const btn=document.getElementById('rtP'+p);
    if(btn)btn.classList.toggle('on',p===rtTotal);
  });
}

function wireRestTimer(){
  const skipBtn=document.getElementById('rtSkip');
  if(skipBtn)skipBtn.addEventListener('click',stopRestTimer);
  // tap time label to add 15s
  const timeEl=document.getElementById('rtTime');
  if(timeEl)timeEl.addEventListener('click',()=>{
    if(rtRemaining>0&&rtRemaining<rtTotal){rtRemaining=Math.min(rtTotal,rtRemaining+15);updateRTDisplay();haptic();}
  });
  RT_PRESETS.forEach(p=>{
    const btn=document.getElementById('rtP'+p);
    if(!btn)return;
    btn.addEventListener('click',()=>{
      rtTotal=p;
      if(document.getElementById('restTimer').classList.contains('on')){
        rtRemaining=p;updateRTDisplay();
      }
      haptic();
    });
  });
  // also stop timer when sheet closes
  document.getElementById('shOv').addEventListener('click',stopRestTimer);
}

// ── WEEKLY PLAN ──────────────────────────────────────────────────────────────
const loadWPlan=()=>{try{return JSON.parse(localStorage.getItem('wplan')||'{}')}catch{return{}}};
const saveWPlan=d=>localStorage.setItem('wplan',JSON.stringify(d));

function renderWPlanSection(containerId){
  const cont=document.getElementById(containerId);if(!cont)return;
  const plan=loadWPlan();
  const dn=tx('days');
  const grid=document.createElement('div');grid.className='wplan-grid';
  for(let i=0;i<7;i++){
    const typeId=plan[i],type=typeId?TM[typeId]:null;
    const col=document.createElement('div');col.className='wplan-day';
    const label=document.createElement('span');label.className='wplan-dn';label.textContent=dn[i];
    const dot=document.createElement('div');
    dot.className='wplan-dot'+(type?' set':'');
    if(type){
      dot.style.background=type.color+'22';
      dot.style.borderColor=type.color;
      dot.style.color='#fff';
      dot.textContent=type.short;
    } else {dot.textContent='+';}
    dot.addEventListener('click',()=>{
      haptic();
      const p=loadWPlan();
      const curIdx=p[i]?TYPES.findIndex(t=>t.id===p[i]):-1;
      const nextIdx=(curIdx+1)%(TYPES.length+1);
      if(nextIdx===TYPES.length)delete p[i];
      else p[i]=TYPES[nextIdx].id;
      saveWPlan(p);
      renderWPlanSection(containerId);
      renderWeek();
    });
    col.append(label,dot);grid.appendChild(col);
  }
  cont.innerHTML='';
  cont.appendChild(grid);
  const hint=document.createElement('div');
  hint.style.cssText='font-size:9px;color:var(--dm);margin-top:8px;text-align:center';
  hint.textContent=lang==='pl'?'dotknij dzień żeby zmienić typ':'tap a day to cycle through types';
  cont.appendChild(hint);
}

// ── PROGRESS CHART (compound lifts) ─────────────────────────────────────────
let progLift=COMPOUNDS[0].key;

function buildProgSection(){
  const tabs=document.getElementById('progTabs');if(!tabs)return;
  set$('progTtl',tx('progSec'));
  // only rebuild if empty or lift changed
  tabs.innerHTML='';
  COMPOUNDS.forEach(({key,short})=>{
    const btn=document.createElement('button');
    btn.className='prog-tab'+(key===progLift?' on':'');
    btn.id='progTab_'+key.replace(/ /g,'_');
    btn.textContent=short;
    btn.addEventListener('click',()=>{progLift=key;renderProgChart();haptic();});
    tabs.appendChild(btn);
  });
}

function renderProgChart(){
  // Sync tab active states
  COMPOUNDS.forEach(({key})=>{
    const btn=document.getElementById('progTab_'+key.replace(/ /g,'_'));
    if(btn)btn.classList.toggle('on',key===progLift);
  });
  const hist=getCompoundHist(progLift);
  const svgEl=document.getElementById('progSvg');
  const statsRow=document.getElementById('progStatsRow');
  if(!svgEl)return;

  if(!hist.length){
    svgEl.style.display='none';
    if(statsRow)statsRow.innerHTML=`<div class="prog-empty">${lang==='pl'?'Brak danych — zaloguj trening z '+progLift:'No data — log a workout with '+progLift}</div>`;
    return;
  }
  svgEl.style.display='block';

  const W=svgEl.clientWidth||340,H=80,PL=4,PR=4,PT=8,PB=18;
  const cW=W-PL-PR,cH=H-PT-PB,n=hist.length;
  const NS='http://www.w3.org/2000/svg';
  svgEl.innerHTML='';svgEl.setAttribute('viewBox',`0 0 ${W} ${H}`);

  const weights=hist.map(h=>h.weight);
  const mn=Math.min(...weights),mx=Math.max(...weights),rng=mx-mn||5;
  const step=n>1?cW/(n-1):cW/2;

  // gradient
  const defs=document.createElementNS(NS,'defs');
  const grad=document.createElementNS(NS,'linearGradient');
  grad.setAttribute('id','pgr');grad.setAttribute('gradientUnits','userSpaceOnUse');
  grad.setAttribute('x1','0');grad.setAttribute('y1',PT+'');grad.setAttribute('x2','0');grad.setAttribute('y2',PT+cH+'');
  const s1=document.createElementNS(NS,'stop');s1.setAttribute('offset','0%');s1.setAttribute('stop-color','#4F7BF7');s1.setAttribute('stop-opacity','.22');
  const s2=document.createElementNS(NS,'stop');s2.setAttribute('offset','100%');s2.setAttribute('stop-color','#4F7BF7');s2.setAttribute('stop-opacity','0');
  grad.append(s1,s2);defs.appendChild(grad);svgEl.appendChild(defs);

  const pts=hist.map((h,i)=>({x:PL+i*step,y:PT+(1-(h.weight-mn)/rng)*cH,w:h.weight,k:h.key}));

  // area
  if(n>1){
    const area=document.createElementNS(NS,'path');
    const d=pts.map((p,i)=>(i===0?`M${p.x},${p.y}`:`L${p.x},${p.y}`)).join(' ')
      +` L${pts[n-1].x},${PT+cH} L${pts[0].x},${PT+cH} Z`;
    area.setAttribute('d',d);area.setAttribute('fill','url(#pgr)');svgEl.appendChild(area);
  }

  // grid
  [0,.5,1].forEach(t=>{
    const l=document.createElementNS(NS,'line'),y=PT+t*cH;
    l.setAttribute('x1',PL+'');l.setAttribute('y1',y+'');l.setAttribute('x2',W-PR+'');l.setAttribute('y2',y+'');
    l.setAttribute('stroke','rgba(128,128,128,.1)');l.setAttribute('stroke-width','0.5');svgEl.appendChild(l);
  });

  // line segments
  for(let i=1;i<pts.length;i++){
    const a=pts[i-1],b=pts[i];
    const l=document.createElementNS(NS,'line');
    l.setAttribute('x1',a.x+'');l.setAttribute('y1',a.y+'');l.setAttribute('x2',b.x+'');l.setAttribute('y2',b.y+'');
    l.setAttribute('stroke',b.w>=a.w?'#30d158':'#ff453a');l.setAttribute('stroke-width','2');l.setAttribute('stroke-linecap','round');
    svgEl.appendChild(l);
  }

  // dots
  const allMax=Math.max(...weights);
  pts.forEach((pt,i)=>{
    const isPR=pt.w===allMax;
    const c=document.createElementNS(NS,'circle');
    c.setAttribute('cx',pt.x+'');c.setAttribute('cy',pt.y+'');
    c.setAttribute('r',isPR?'3.5':(n>15?'1.5':'2.2'));
    c.setAttribute('fill',isPR?'#ffd60a':'#4F7BF7');
    svgEl.appendChild(c);
    // date labels for first, last, PR (only if not crowded)
    if(n<=18&&(i===0||i===pts.length-1||isPR)){
      const[,m,d]=pt.k.split('-').map(Number);
      const t=document.createElementNS(NS,'text');
      t.setAttribute('x',pt.x+'');t.setAttribute('y',H-3+'');
      t.setAttribute('text-anchor',i===0?'start':i===pts.length-1?'end':'middle');
      t.setAttribute('font-size','7');t.setAttribute('font-family','-apple-system,sans-serif');
      t.setAttribute('fill','rgba(142,142,147,.8)');t.textContent=`${d}/${m}`;
      svgEl.appendChild(t);
    }
  });

  // stats row
  if(statsRow){
    const last=hist[hist.length-1],first=hist[0];
    const gain=last.weight-first.weight;
    const pl=lang==='pl';
    statsRow.innerHTML=`
      <div class="prog-stat"><div class="prog-stat-n">${allMax}<span style="font-size:10px;color:var(--mt)">kg</span></div><div class="prog-stat-l">max</div></div>
      <div class="prog-div"></div>
      <div class="prog-stat"><div class="prog-stat-n">${last.weight}<span style="font-size:10px;color:var(--mt)">kg</span></div><div class="prog-stat-l">${pl?'ostatni':'last'}</div></div>
      <div class="prog-div"></div>
      <div class="prog-stat"><div class="prog-stat-n" style="color:${gain>0?'#30d158':gain<0?'#ff453a':'var(--tx)'}">${gain>0?'+':''}${gain}<span style="font-size:10px">kg</span></div><div class="prog-stat-l">${pl?'łącznie':'total'}</div></div>
      <div class="prog-div"></div>
      <div class="prog-stat"><div class="prog-stat-n">${n}</div><div class="prog-stat-l">${pl?'sesji':'sessions'}</div></div>
    `;
  }

  svgEl.style.opacity='0';svgEl.style.transition='opacity .35s';
  requestAnimationFrame(()=>{svgEl.style.opacity='1';});
}

// ── BODY WEIGHT CHART ────────────────────────────────────────────────────────
let bwRange='3m'; // '1m','3m','1y'

function buildBWSection(){
  const tabs=document.getElementById('bwRangeTabs');if(!tabs)return;
  set$('bwChartTtl',lang==='pl'?'masa ciała':'body weight');
  tabs.innerHTML='';
  [['1m','1m'],['3m','3m'],['1r','1y']].forEach(([lbl,val])=>{
    const btn=document.createElement('button');
    btn.className='prog-tab'+(val===bwRange?' on':'');
    btn.textContent=lbl;
    btn.addEventListener('click',()=>{bwRange=val;buildBWSection();renderBWChart();haptic();});
    tabs.appendChild(btn);
  });
}

function renderBWChart(){
  const allData=loadBW();
  const svgEl=document.getElementById('bwChartSvg');
  const statsRow=document.getElementById('bwChartStats');
  if(!svgEl)return;

  // filter by range
  const now=new Date(today);
  const cutoff=new Date(now);
  if(bwRange==='1m')cutoff.setMonth(cutoff.getMonth()-1);
  else if(bwRange==='3m')cutoff.setMonth(cutoff.getMonth()-3);
  else cutoff.setFullYear(cutoff.getFullYear()-1);
  const cutKey=gk(cutoff.getFullYear(),cutoff.getMonth(),cutoff.getDate());

  const pts=Object.entries(allData)
    .filter(([k])=>k>=cutKey)
    .sort((a,b)=>a[0].localeCompare(b[0]))
    .map(([k,v])=>({k,v:+v}));

  if(!pts.length){
    svgEl.style.display='none';
    if(statsRow)statsRow.innerHTML=`<div class="prog-empty">${lang==='pl'?'Brak danych masy ciała w tym okresie':'No body weight data for this period'}</div>`;
    return;
  }
  svgEl.style.display='block';

  const W=svgEl.clientWidth||340,H=80,PL=4,PR=4,PT=8,PB=18;
  const cW=W-PL-PR,cH=H-PT-PB,n=pts.length;
  const NS='http://www.w3.org/2000/svg';
  svgEl.innerHTML='';svgEl.setAttribute('viewBox',`0 0 ${W} ${H}`);

  const weights=pts.map(p=>p.v);
  const mn=Math.min(...weights),mx=Math.max(...weights);
  // add 10% padding to y range for visual breathing room
  const pad_=((mx-mn)||1)*0.15;
  const yMin=mn-pad_,yMax=mx+pad_,yRng=yMax-yMin;
  const step=n>1?cW/(n-1):cW/2;

  // trend color — down = green (losing weight), up = orange
  const trendUp=weights[weights.length-1]>weights[0];
  const trendClr=trendUp?'#ff9f0a':'#30d158';

  // gradient
  const defs=document.createElementNS(NS,'defs');
  const grad=document.createElementNS(NS,'linearGradient');
  grad.setAttribute('id','bwGrad');grad.setAttribute('gradientUnits','userSpaceOnUse');
  grad.setAttribute('x1','0');grad.setAttribute('y1',PT+'');grad.setAttribute('x2','0');grad.setAttribute('y2',PT+cH+'');
  const s1=document.createElementNS(NS,'stop');s1.setAttribute('offset','0%');s1.setAttribute('stop-color',trendClr);s1.setAttribute('stop-opacity','.18');
  const s2=document.createElementNS(NS,'stop');s2.setAttribute('offset','100%');s2.setAttribute('stop-color',trendClr);s2.setAttribute('stop-opacity','0');
  grad.append(s1,s2);defs.appendChild(grad);svgEl.appendChild(defs);

  const coords=pts.map((p,i)=>({x:PL+i*step,y:PT+(1-(p.v-yMin)/yRng)*cH,p}));

  // area fill
  if(n>1){
    const area=document.createElementNS(NS,'path');
    const d=coords.map((c,i)=>(i===0?`M${c.x},${c.y}`:`L${c.x},${c.y}`)).join(' ')
      +` L${coords[n-1].x},${PT+cH} L${coords[0].x},${PT+cH} Z`;
    area.setAttribute('d',d);area.setAttribute('fill','url(#bwGrad)');svgEl.appendChild(area);
  }

  // grid lines
  [0,.5,1].forEach(t=>{
    const l=document.createElementNS(NS,'line'),y=PT+t*cH;
    l.setAttribute('x1',PL+'');l.setAttribute('y1',y+'');l.setAttribute('x2',W-PR+'');l.setAttribute('y2',y+'');
    l.setAttribute('stroke','rgba(128,128,128,.1)');l.setAttribute('stroke-width','0.5');
    svgEl.appendChild(l);
    // y-axis labels
    const val=(yMax-t*(yMax-yMin)).toFixed(1);
    const tl=document.createElementNS(NS,'text');
    tl.setAttribute('x',String(PL+2));tl.setAttribute('y',String(y-2));
    tl.setAttribute('font-size','6');tl.setAttribute('font-family','-apple-system,sans-serif');
    tl.setAttribute('fill','rgba(142,142,147,.6)');tl.textContent=val+'kg';
    svgEl.appendChild(tl);
  });

  // line
  for(let i=1;i<coords.length;i++){
    const a=coords[i-1],b=coords[i];
    const l=document.createElementNS(NS,'line');
    l.setAttribute('x1',a.x+'');l.setAttribute('y1',a.y+'');l.setAttribute('x2',b.x+'');l.setAttribute('y2',b.y+'');
    l.setAttribute('stroke',b.p.v<=a.p.v?'#30d158':'#ff9f0a');
    l.setAttribute('stroke-width','2');l.setAttribute('stroke-linecap','round');
    svgEl.appendChild(l);
  }

  // dots + date labels for first/last
  coords.forEach((c,i)=>{
    const dot=document.createElementNS(NS,'circle');
    dot.setAttribute('cx',c.x+'');dot.setAttribute('cy',c.y+'');
    dot.setAttribute('r',n>20?'1.5':'2.2');dot.setAttribute('fill',trendClr);
    svgEl.appendChild(dot);
    if((i===0||i===n-1)&&n<=30){
      const[,m,d]=c.p.k.split('-').map(Number);
      const t=document.createElementNS(NS,'text');
      t.setAttribute('x',c.x+'');t.setAttribute('y',String(H-3));
      t.setAttribute('text-anchor',i===0?'start':'end');
      t.setAttribute('font-size','7');t.setAttribute('font-family','-apple-system,sans-serif');
      t.setAttribute('fill','rgba(142,142,147,.8)');t.textContent=`${d}/${m}`;
      svgEl.appendChild(t);
    }
  });

  // stats row
  if(statsRow){
    const first=pts[0],last=pts[pts.length-1];
    const change=+(last.v-first.v).toFixed(1);
    const minW=Math.min(...weights),maxW=Math.max(...weights);
    const pl=lang==='pl';
    const chClr=change<0?'#30d158':change>0?'#ff9f0a':'var(--tx)';
    statsRow.innerHTML=`
      <div class="prog-stat"><div class="prog-stat-n">${first.v}<span style="font-size:10px;color:var(--mt)">kg</span></div><div class="prog-stat-l">${pl?'start':'start'}</div></div>
      <div class="prog-div"></div>
      <div class="prog-stat"><div class="prog-stat-n">${last.v}<span style="font-size:10px;color:var(--mt)">kg</span></div><div class="prog-stat-l">${pl?'teraz':'now'}</div></div>
      <div class="prog-div"></div>
      <div class="prog-stat"><div class="prog-stat-n" style="color:${chClr}">${change>0?'+':''}${change}<span style="font-size:10px">kg</span></div><div class="prog-stat-l">${pl?'zmiana':'change'}</div></div>
      <div class="prog-div"></div>
      <div class="prog-stat"><div class="prog-stat-n" style="font-size:13px">${minW}–${maxW}<span style="font-size:9px;color:var(--mt)">kg</span></div><div class="prog-stat-l">${pl?'zakres':'range'}</div></div>
    `;
  }

  svgEl.style.opacity='0';svgEl.style.transition='opacity .35s';
  requestAnimationFrame(()=>{svgEl.style.opacity='1';});
}
